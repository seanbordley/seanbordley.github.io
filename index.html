    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            /* Dark Mode (Default) */
            --bg-base: #020617; 
            --bg-gradient-center: #1e293b; 
            
            --text-main: #f1f5f9; 
            
            /* Professional Gradient Accent */
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%); 
            --accent-color: #3b82f6; 
            
            --card-fill: #0f172a;    
            
            --social-bg: rgba(0,0,0,0.5);
            --modal-overlay: rgba(2, 6, 23, 0.85); 

            /* Modal Aesthetics (Dark) */
            --modal-bg: #1e293b; 
            --modal-border: 1px solid #3b82f6;
            --modal-text: #e2e8f0;
            --input-bg: #0f172a;
            --input-text: #ffffff;
            --input-border: 1px solid #334155;
        }

        /* Light Mode Overrides */
        [data-theme="light"] {
            --bg-base: #f1f5f9;      
            --bg-gradient-center: #ffffff; 

            --text-main: #334155;     
            
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #0891b2 100%);
            --accent-color: #2563eb; 
            
            --card-fill: #e2e8f0;     
            
            --social-bg: rgba(255,255,255,0.6);
            --modal-overlay: rgba(255, 255, 255, 0.85);

            /* Modal Aesthetics (Light) */
            --modal-bg: #ffffff;
            --modal-border: 1px solid #2563eb;
            --modal-text: #1e293b;
            --input-bg: #f8fafc;
            --input-text: #1e293b;
            --input-border: 1px solid #cbd5e1;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, var(--bg-gradient-center) 0%, var(--bg-base) 100%);
            background-attachment: fixed; 
            color: var(--text-main);           
            overflow: hidden;
            transition: color 0.4s ease; 
        }

        main {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Main container for the interactive hexagon layout */
        .hexagon-showcase-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 79.2vmin; 
            height: 79.2vmin;
            transition: opacity 0.3s ease;
        }

        .hexagon-showcase-container.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* The user's photo in the center */
        .center-photo {
            position: absolute;
            width: 25.61vmin; 
            height: 29.44vmin; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; 
            transition: opacity 0.5s ease;
            background: var(--accent-gradient);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4)); 
        }

        .center-photo img {
            width: 98%; 
            height: 98%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background-color: var(--card-fill); 
        }

        /* Individual project card styling */
        .project-card {
            position: absolute;
            width: 24.56vmin; 
            height: 28.19vmin; 
            top: 50%;
            left: 50%;
            margin-top: -14.1vmin; 
            margin-left: -12.28vmin; 
            z-index: 5; 
            opacity: .85; 
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease, filter 0.3s ease;
            backface-visibility: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--accent-gradient);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        @media (hover: hover) {
            .project-card:hover {
                transform: translateY(-5px) scale(1.02); 
                filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.6));
                opacity: 1;
                z-index: 20; 
            }
        }

        .project-card::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 98%; 
            height: 98%;
            background-color: var(--card-fill); 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        .project-card.is-enlarged::before {
            opacity: 0;
        }

        .project-card img {
            width: 98%; 
            height: 98%;
            object-fit: cover;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            opacity: 0; 
            transition: opacity 0.3s ease;
        }

        .hex-text {
            position: absolute;
            z-index: 10;
            color: white; 
            font-weight: 700; 
            font-size: 3vmin; 
            text-align: center;
            pointer-events: none;
            text-shadow: 0 4px 12px rgba(0,0,0,0.9);
            letter-spacing: 0.15em; 
            text-transform: uppercase;
        }

        .project-card.is-enlarged .hex-text {
            display: none !important;
        }

        /* Positions for the 6 surrounding hexagons */
        .project-card:nth-of-type(1) { transform: rotate(30deg) translateY(-26.02vmin) rotate(-30deg); }
        .project-card:nth-of-type(2) { transform: rotate(90deg) translateY(-26.02vmin) rotate(-90deg); }
        .project-card:nth-of-type(3) { transform: rotate(150deg) translateY(-26.02vmin) rotate(-150deg); }
        .project-card:nth-of-type(4) { transform: rotate(210deg) translateY(-26.02vmin) rotate(-210deg); }
        .project-card:nth-of-type(5) { transform: rotate(270deg) translateY(-26.02vmin) rotate(-270deg); }
        .project-card:nth-of-type(6) { transform: rotate(330deg) translateY(-26.02vmin) rotate(-330deg); }

        /* JS-Controlled Animation States */
        .project-card.is-faded {
            opacity: 0.2; 
            z-index: 4;
            transition: opacity 0.4s ease;
            filter: grayscale(0.8) blur(2px); 
        }

        .hexagon-showcase-container.is-active .center-photo {
            opacity: 0;
            transition: none;
        }

        .hexagon-showcase-container.is-focused .project-card:not(.is-enlarged),
        .hexagon-showcase-container.is-focused .center-photo {
            opacity: 0;
        }

        .project-card.is-central {
            transform: translate(0, 0) scale(1.05);
            z-index: 10;
        }

        .project-card.is-enlarged {
            transform: translate(0, 0) scale(2.8);
            z-index: 15;
            background: transparent; 
            clip-path: inset(0% round 1vmin);
            overflow: visible;
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.8)); 
        }

        .project-card.is-enlarged img {
            clip-path: inset(0% round 1vmin);
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: transparent; 
            opacity: 1; 
        }

        .project-card.is-enlarged .project-overlay {
            display: none !important; 
        }

        .project-overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.6)); 
            opacity: 0;
            transition: opacity 0.4s ease;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        #project-title-display {
            position: fixed;
            top: 2%; 
            left: 50%;
            transform: translate(-50%, 0);
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: var(--accent-color); 
            font-size: 5vmin;
            font-weight: 300; 
            letter-spacing: 0.3em; 
            text-transform: uppercase;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            opacity: 0;
            white-space: nowrap;
            transition: opacity 0.4s ease-out;
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }

        #project-subtitle-display {
            display: block;
            font-size: 1.2vmin;
            font-weight: 600;
            letter-spacing: 0.1em;
            -webkit-text-fill-color: var(--text-main);
            color: var(--text-main);
            opacity: 0.6;
            margin-top: 0.5vmin;
        }

        #project-title-display.is-visible {
            opacity: 1;
        }

        /* Social Icons Container */
        .social-icons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 4000; 
            display: flex;
            flex-direction: row;
            justify-content: center;
            padding: 1vmin 2vmin;
            background-color: var(--social-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.05);
            gap: 5vmin;
            transition: background-color 0.4s ease;
        }

        .social-icon {
            font-size: 12vmin;
            transition: color 0.3s ease, opacity 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 6vmin; 
            opacity: 1; 
        }

        /* Rainbow / ROYGBIV Colors */
        .resume-icon { color: #ff0000; }      
        .email-icon { color: #ffa500; }       
        .imdb-icon { color: #ffff00; }        
        .github-icon { color: #00ff00; }      
        .linkedin-icon { color: #0000ff; }    
        .file-icon { color: #8b00ff; }        

        @media (hover: hover) {
            .social-icon {
                transition: transform 0.3s ease, color 0.3s ease, opacity 0.3s ease;
            }
            .social-icon:hover {
                transform: scale(1.15);
                opacity: 1; 
                filter: drop-shadow(0 0 10px currentColor); 
            }
            .project-card:hover .project-overlay {
                opacity: 1;
            }
        }

        /* Orientation Lock Message */
        #orientation-lock-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base); 
            color: var(--accent-color); 
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #orientation-lock-message i {
            font-size: 6vmin;
            margin-bottom: 2vmin;
            animation: rotate-animation 1.5s ease-in-out infinite;
        }

        @keyframes rotate-animation {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        /* Responsive adjustments for Mobile */
        @media (max-width: 700px) {
            .hexagon-showcase-container { width: 80vmin; height: 80vmin; }
            .center-photo { width: 27.1vmin; height: 31.1vmin; }
            .project-card { width: 27.1vmin; height: 31.1vmin; margin-top: -15.55vmin; margin-left: -13.55vmin; }
            .project-card:nth-of-type(1) { transform: rotate(30deg) translateY(-28.5vmin) rotate(-30deg); }
            .project-card:nth-of-type(2) { transform: rotate(90deg) translateY(-28.5vmin) rotate(-90deg); }
            .project-card:nth-of-type(3) { transform: rotate(150deg) translateY(-28.5vmin) rotate(-150deg); }
            .project-card:nth-of-type(4) { transform: rotate(210deg) translateY(-28.5vmin) rotate(-210deg); }
            .project-card:nth-of-type(5) { transform: rotate(270deg) translateY(-28.5vmin) rotate(-270deg); }
            .project-card:nth-of-type(6) { transform: rotate(330deg) translateY(-28.5vmin) rotate(-330deg); }
            
            .project-card.is-enlarged { transform: translate(0, 0) scale(3.1); }
            .hex-text { font-size: 3.5vmin; padding: 1vmin 2vmin; }

            #project-title-display { font-size: 8vmin; top: 8%; left: 50%; transform: translate(-50%, 0); text-align: center; }
            #project-subtitle-display { font-size: 3vmin; margin-top: 1vmin; -webkit-text-fill-color: var(--text-main); color: var(--text-main); }
        }

        /* Responsive adjustments for Desktop */
        @media (min-width: 701px) {
            .social-icons {
                position: fixed; top: 50%; left: 2.5vmin; right: auto; bottom: auto; width: auto;
                transform: translateY(-50%); flex-direction: column; background-color: transparent;
                padding: 0; gap: 2.5vmin; backdrop-filter: none; -webkit-backdrop-filter: none; border-top: none;
            }
            .social-icon { font-size: 6vmin; }
        }

        /* Landscape orientation on mobile */
        @media (max-width: 705px) and (orientation: landscape) {
            #main-content, .social-icons { display: none; }
            #orientation-lock-message { display: flex; }
        }

        /* Modals */
        .contact-modal-overlay, .project-content-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-overlay); backdrop-filter: blur(8px);
            z-index: 6000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        .project-content-overlay { z-index: 3000; background-color: rgba(0, 0, 0, 0.95); }

        .contact-modal-overlay.is-visible, .project-content-overlay.is-visible {
            opacity: 1; pointer-events: auto; display: flex;
        }

        .project-content-overlay.background-faded { display: none !important; opacity: 0 !important; pointer-events: none; }

        .contact-modal {
            background: linear-gradient(var(--card-fill), var(--card-fill)) padding-box, 
                        var(--accent-gradient) border-box;
            border: 2px solid transparent; color: var(--modal-text); padding: 2.5rem; 
            border-radius: 16px; width: 90%; max-width: 500px; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); height: auto; max-height: 85vh; 
            overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; 
            display: flex; flex-direction: column;
        }

        .contact-modal .close-button {
            position: absolute; top: 0.75rem; right: 1.5rem; 
            font-family: 'Inter', sans-serif; font-size: 2rem; font-weight: 200; line-height: 1; cursor: pointer;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            color: var(--accent-color); transition: transform 0.2s, filter 0.2s;
        }

        .contact-modal .close-button:hover { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--accent-color)); }

        .contact-modal h2 {
            margin-top: 0; text-align: center; flex-shrink: 0; font-size: 2rem; font-weight: 300; letter-spacing: 0.2em; 
            margin-bottom: 2rem; color: var(--accent-color);
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #contact-form { display: flex; flex-direction: column; min-height: 0; }
        #form-content { display: flex; flex-direction: column; min-height: 0; gap: 1.5rem; padding-bottom: 0.5rem; }
        .contact-modal label { display: block; margin-bottom: 0; }
        #form-content label:nth-of-type(2) { display: flex; flex-direction: column; margin-bottom: 0; }

        .contact-modal input, .contact-modal textarea {
            width: 100%; padding: 0.85rem; margin-bottom: 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            font-family: 'Inter', sans-serif; color: var(--input-text); background-color: rgba(15, 23, 42, 0.6); 
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        .contact-modal input:focus, .contact-modal textarea:focus {
            outline: none; border-color: var(--accent-color); background-color: rgba(15, 23, 42, 1); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
        }
        .contact-modal textarea { min-height: 120px; resize: vertical; }

        .contact-modal input[type="file"] { padding: 0.5rem; line-height: 1.5; cursor: pointer; font-size: 0.9rem; border: none; background: transparent; }
        .contact-modal input[type="file"]::file-selector-button {
            background: var(--accent-gradient); color: white; border: none; padding: 0.35rem 1rem; margin-right: 1rem;
            border-radius: 4px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: opacity 0.2s;
        }
        .contact-modal input[type="file"]::file-selector-button:hover { opacity: 0.9; }

        #form-content > label:last-of-type { margin-bottom: 0; }
        #form-content > label:last-of-type input { margin-bottom: 0; }

        .contact-modal button {
            width: 100px; height: 86px; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 0.5rem auto; padding: 0; position: relative; flex-shrink: 0; 
            background: var(--accent-gradient); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: none; cursor: pointer; transition: transform 0.3s ease, opacity 0.3s ease, filter 0.3s;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .contact-modal button::before {
            content: ''; position: absolute; top: 2px; left: 2px; width: calc(100% - 4px); height: calc(100% - 4px);
            background-color: var(--modal-bg); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            z-index: 1; transition: background-color 0.3s;
        }
        .contact-modal button:hover::before { background: var(--accent-gradient); }
        .contact-modal button:hover .btn-text { color: white; }
        .contact-modal button .btn-text {
            position: relative; z-index: 2; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1rem; 
            text-transform: uppercase; letter-spacing: 0.1em; color: white; transition: color 0.3s;
        }
        .contact-modal button:hover { transform: scale(1.05); filter: drop-shadow(0 6px 12px rgba(59, 130, 246, 0.4)); }

        .project-content-modal {
            width: 100%; height: 100%; background-color: transparent; position: relative; border-radius: 0; overflow: hidden; box-shadow: none; 
        }
        .project-content-modal iframe { width: 100%; height: 100%; border: none; }
        .project-content-modal .close-button {
            position: absolute; top: 0; right: 20px; z-index: 10; padding: 10px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 3rem; font-weight: 200; line-height: 1;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: var(--accent-color); 
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); transition: transform 0.2s, filter 0.2s;
        }
        .project-content-modal .close-button:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--accent-color)); }
    </style>
</head>

            </a>
             <a href="/site_files/about/page.html" class="project-card" data-title="ABOUT">
                <img src="/site_files/about/main.jpg" alt="About Project">
                <span class="hex-text">ABOUT</span>
                <div class="project-overlay"></div>
            </a>
        </div>
        
        <div id="project-title-display">
            <span id="project-main-title"></span>
            <span id="project-subtitle-display">(CLICK FOR MORE)</span>
        </div>
    </main>

    <div id="project-content-overlay" class="project-content-overlay">
        <div class="project-content-modal">
            <span id="close-project-button" class="close-button">&times;</span>
            <iframe id="project-iframe" src="about:blank" title="Project Content"></iframe>
        </div>
    </div>

    <div id="contact-modal-overlay" class="contact-modal-overlay">
        <div class="contact-modal">
            <span id="close-modal-button" class="close-button">&times;</span>
            <h2>CONTACT</h2>
            <form id="contact-form" action="https://formspree.io/f/xqalgbnj" method="POST" enctype="multipart/form-data">
                <div id="form-content">
                    <label>
                        <input type="email" name="email" placeholder="Your email" required>
                    </label>
                    <label>
                        <textarea name="message" placeholder="Your message" required></textarea>
                    </label>
                    <label>
                        <input type="file" name="attachment">
                    </label>
                    <button type="submit"><span class="btn-text">Send</span></button>
                </div>
                <div id="form-success-message" style="display: none;">
                    <p style="text-align: center; font-size: 5vmin; color: var(--accent-color); font-weight: bold;">Thank you!</p>
                </div>
            </form>
        </div>
    </div>

    <div id="construction-overlay" class="fixed inset-0 z-50 flex items-center justify-center text-center text-white p-4" style="background-color: rgba(26, 32, 44, 0.9); display: none;">
        <div class="max-w-lg">
            <img src="/site_files/media/logo.png" alt="Site Icon" class="mx-auto h-20 w-20 mb-6">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Under Construction</h1>
            <p class="text-lg md:text-xl text-gray-300">Website is currently undergoing scheduled updates.</p>
            <p class="mt-2 text-gray-400">Thank you for your patience!</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Check Construction Overlay logic
            const overlay = document.getElementById('construction-overlay');
            if (overlay) {
                if (typeof SITE_MODE !== 'undefined' && SITE_MODE === 1) {
                    overlay.style.display = 'flex';
                } else {
                    overlay.style.display = 'none';
                }
            }

            // Element Selection
            const showcase = document.getElementById('showcase');
            const projects = Array.from(showcase.querySelectorAll('.project-card'));
            const mainContent = document.getElementById('main-content');
            const titleDisplay = document.getElementById('project-title-display');
            const mainTitleDisplay = document.getElementById('project-main-title');
            const emailIconButton = document.getElementById('email-icon-button');
            const contactModalOverlay = document.getElementById('contact-modal-overlay');
            const closeModalButton = document.getElementById('close-modal-button');
            const hexagonContainer = document.getElementById('showcase');
            const contactForm = document.getElementById('contact-form');
            const formContent = document.getElementById('form-content');
            const successMessage = document.getElementById('form-success-message');
            
            const projectContentOverlay = document.getElementById('project-content-overlay');
            const closeProjectButton = document.getElementById('close-project-button');
            const projectIframe = document.getElementById('project-iframe');

            let enlargeTimeout;
            let lastHoveredProject = null;
            let touchStartX = 0;
            let touchStartY = 0;
            let touchEndX = 0;
            let touchEndY = 0;

            // --- Project Content Overlay Logic ---
            const openProjectOverlay = (url) => {
                projectIframe.src = url;
                hexagonContainer.classList.add('is-hidden'); 
                projectContentOverlay.classList.add('is-visible');
            };

            const closeProjectOverlay = () => {
                projectContentOverlay.classList.remove('is-visible');
                hexagonContainer.classList.remove('is-hidden');
                setTimeout(() => {
                    projectIframe.src = "about:blank"; 
                }, 300);
            };

            closeProjectButton.addEventListener('click', closeProjectOverlay);
            
            projectContentOverlay.addEventListener('click', (e) => {
                if (e.target === projectContentOverlay) {
                    closeProjectOverlay();
                }
            });

            // --- Contact Form Logic ---
            emailIconButton.addEventListener('click', (e) => {
                e.preventDefault();
                contactModalOverlay.classList.add('is-visible');
                hexagonContainer.classList.add('is-hidden');

                if (projectContentOverlay.classList.contains('is-visible')) {
                    projectContentOverlay.classList.add('background-faded');
                }
            });

            const closeModal = () => {
                contactModalOverlay.classList.remove('is-visible');
                
                const returningToProject = projectContentOverlay.classList.contains('is-visible');
                projectContentOverlay.classList.remove('background-faded');

                if (returningToProject) {
                    hexagonContainer.classList.add('is-hidden');
                } else {
                    hexagonContainer.classList.remove('is-hidden');
                }
                
                setTimeout(() => {
                    contactForm.reset();
                    formContent.style.removeProperty('display'); 
                    successMessage.style.display = 'none';
                }, 300);
            };

            closeModalButton.addEventListener('click', closeModal);
            
            contactModalOverlay.addEventListener('click', (e) => {
                if (e.target === contactModalOverlay) {
                    closeModal();
                }
            });

            contactForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                fetch(this.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                }).then(response => {
                    if (response.ok) {
                        formContent.style.display = 'none';
                        successMessage.style.display = 'block';
                        setTimeout(closeModal, 2000); 
                    } else {
                        alert('Oops! There was a problem submitting your form.');
                    }
                }).catch(error => {
                    alert('Oops! There was a problem submitting your form.');
                });
            });

            // --- Interaction Logic ---
            const resetAllProjects = () => {
                clearTimeout(enlargeTimeout);
                showcase.classList.remove('is-active', 'is-focused');
                projects.forEach(p => {
                    p.classList.remove('is-faded', 'is-central', 'is-enlarged');
                });
                titleDisplay.classList.remove('is-visible');
            };

            const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

            if (!isDesktop) {
                // Mobile Touch Logic
                projects.forEach(project => {
                    project.addEventListener('click', function(e) {
                        e.preventDefault();
                        const swipeDistance = Math.abs(touchEndX - touchStartX);
                        if (swipeDistance > 20) return;
                        const url = this.getAttribute('href');
                        if (url) openProjectOverlay(url);
                    });
                });

                mainContent.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    const element = document.elementFromPoint(touch.clientX, touch.clientY);
                    const currentProject = element ? element.closest('.project-card') : null;

                    if (currentProject && currentProject !== lastHoveredProject) {
                        lastHoveredProject = currentProject;
                        const title = currentProject.dataset.title;
                        if (title) {
                            mainTitleDisplay.textContent = title;
                            titleDisplay.classList.add('is-visible');
                        }
                    } else if (!currentProject && lastHoveredProject) {
                        lastHoveredProject = null;
                        titleDisplay.classList.remove('is-visible');
                    }
                });

                mainContent.addEventListener('touchend', () => {
                    lastHoveredProject = null;
                    if (!showcase.classList.contains('is-focused')) {
                        titleDisplay.classList.remove('is-visible');
                    }
                });

                mainContent.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                    touchStartY = e.changedTouches[0].screenY;
                    touchEndX = e.changedTouches[0].screenX; 
                    touchEndY = e.changedTouches[0].screenY; 
                }, false);

                mainContent.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    touchEndY = e.changedTouches[0].screenY;
                }, false);

            } else {
                // Desktop Hover Logic
                projects.forEach(project => {
                    project.addEventListener('mouseenter', function() {
                        projects.forEach(p => p.classList.remove('is-central'));
                        showcase.classList.add('is-active');
                        projects.forEach(p => {
                            if (p !== this) p.classList.add('is-faded');
                        });
                        this.classList.remove('is-faded');
                        
                        const title = this.dataset.title;
                        if (title) {
                            mainTitleDisplay.textContent = title;
                            titleDisplay.classList.add('is-visible');
                        }
                    });

                    project.addEventListener('click', function(e) {
                        e.preventDefault();
                        const url = this.getAttribute('href');
                        if (url) openProjectOverlay(url);
                    });
                });

                showcase.addEventListener('mouseleave', () => {
                    resetAllProjects();
                });
            }

            // --- THEME AUTO-DETECT LOGIC ---
            const setTheme = (isDark) => {
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            };

            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            setTheme(mediaQuery.matches);
            mediaQuery.addEventListener('change', (e) => setTheme(e.matches));
            
            console.log(`Portfolio Version: ${SITE_VERSION}`);

            // --- OFFLINE CACHING (Service Worker Registration) ---
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then(registration => {
                            console.log('ServiceWorker registration successful with scope: ', registration.scope);
                        }, err => {
                            console.log('ServiceWorker registration failed: ', err);
                        });
                });
            }
        });
    </script>
</body>
</html>
