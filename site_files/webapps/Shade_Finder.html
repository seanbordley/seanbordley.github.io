<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Shade Finder</title>
    
    <link rel="manifest" id="manifest-link">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
    
    <!-- Leaflet Map Integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            overscroll-behavior: none; /* Disables pull-to-refresh */
            touch-action: pan-x pan-y;
            background-color: black;
        }
        /* Lock scrolling on mobile/tablet */
        @media (max-width: 1023px) {
            html, body {
                overflow: hidden;
                position: fixed;
                width: 100%;
                height: 100%;
            }
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .loader {
            border: 0.5vmin solid #4a5568; 
            border-top: 0.5vmin solid #4299e1;
            border-radius: 50%;
            width: 5vmin;
            height: 5vmin;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input:disabled {
            background-color: #2d3748;
            cursor: not-allowed;
            color: #718096;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .unit-toggle {
            background-color: transparent;
            transition: background-color 0.2s;
        }
        .active-unit {
            background-color: #3b82f6;
            color: white;
        }
        input[type="time"]::-webkit-calendar-picker-indicator,
        input[type="date"]::-webkit-calendar-picker-indicator {
            display: none;
        }
        #shadow-ellipse {
            cursor: grab;
            touch-action: none;
        }
        #shadow-ellipse:active {
            cursor: grabbing;
        }
        select {
            scrollbar-width: thin;
            scrollbar-color: #4a5568 #1a202c;
        }
        /* Leaflet Dark Mode Filter */
        #leaflet-bg {
            filter: invert(100%) hue-rotate(180deg) brightness(90%) contrast(120%);
        }
        /* Hide Leaflet UI completely just in case */
        .leaflet-control-container {
            display: none !important;
        }
    </style>
</head>
<body class="text-gray-300 h-[100dvh] w-full m-0 p-0 font-sans bg-black flex flex-col items-center justify-center overflow-hidden">
    
    <!-- Main wrapper: tightly hugs content and scales to max 72vh on desktop -->
    <div class="w-full mx-auto flex flex-col bg-black relative" style="max-width: min(100vw, 72vh);">

        <!-- Header -->
        <div class="w-full text-center py-2 md:py-4 z-20 bg-black border-b border-gray-800 flex-shrink-0">
            <h1 class="font-bold text-blue-400 text-2xl md:text-4xl tracking-tight">Shade Finder</h1>
            <p class="text-gray-400 text-xs md:text-sm mt-0.5 md:mt-1">Plan your perfect spot in the shade.</p>
        </div>

        <!-- Map Container (Square) -->
        <div class="relative w-full aspect-square bg-gray-900 z-10 flex-shrink-0" id="map-container">
            <!-- Leaflet Map rendered underneath the SVG -->
            <div id="leaflet-bg" class="absolute inset-0 z-0"></div>
            
            <!-- Map Zoom Controls -->
            <div class="absolute top-2 md:top-4 right-2 md:right-4 flex flex-col gap-1.5 md:gap-2 z-20 pointer-events-auto">
                <button id="zoom-in-btn" title="Zoom In" class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-md md:rounded-lg bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg text-white">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12M6 12h12"></path></svg>
                </button>
                <button id="zoom-out-btn" title="Zoom Out" class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-md md:rounded-lg bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg text-white">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                </button>
            </div>

            <!-- SVG Interactive Grid -->
            <svg id="sky" viewBox="0 0 200 200" class="absolute inset-0 w-full h-full z-10 pointer-events-none">
                <defs>
                    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
                        <feOffset dx="0.5" dy="0.5" result="offsetblur"/>
                        <feFlood flood-color="black" flood-opacity="0.8"/>
                        <feComposite in2="offsetblur" operator="in"/>
                        <feMerge>
                            <feMergeNode/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <mask id="shadow-mask" maskUnits="userSpaceOnUse">
                        <g id="shadow-mask-group"></g>
                    </mask>
                </defs>
                
                <rect x="0" y="0" width="200" height="200" fill="#3b82f6" fill-opacity="0.4" mask="url(#shadow-mask)" style="pointer-events: none;" />

                <g id="grid-overlay"></g>
                <text x="100" y="15" text-anchor="middle" fill="currentColor" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)">N</text>
                <text x="100" y="190" text-anchor="middle" fill="currentColor" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)">S</text>
                <text x="10" y="104" fill="currentColor" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)">W</text>
                <text x="182" y="104" fill="currentColor" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)">E</text>
                <line x1="100" y1="18" x2="100" y2="25" stroke="currentColor" stroke-width="0.5" class="opacity-50"/>
                <line x1="100" y1="182" x2="100" y2="175" stroke="currentColor" stroke-width="0.5" class="opacity-50"/>
                <line x1="18" y1="100" x2="25" y2="100" stroke="currentColor" stroke-width="0.5" class="opacity-50"/>
                <line x1="182" y1="100" x2="175" y2="100" stroke="currentColor" stroke-width="0.5" class="opacity-50"/>
                
                <g id="info-text-group" text-anchor="middle" fill="currentColor" class="font-semibold" font-size="5.5" filter="url(#text-shadow)">
                      <text x="100" y="20">
                          <tspan id="shade-dims-text" x="100" dy="1.4em"></tspan>
                          <tspan id="center-pos-text" x="100" dy="1.4em"></tspan>
                      </text>
                </g>
                
                <circle id="sun-indicator" r="5" fill="#FBBF24" fill-opacity="0.9" stroke="#F59E0B" stroke-width="0.5" />
                <g id="hourly-dots-group"></g>
                
                <!-- Explicitly turn pointer-events back on for the interactive ellipse -->
                <ellipse id="shadow-ellipse" cx="100" cy="100" rx="20" ry="20" fill="#3b82f6" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1" style="pointer-events: auto;"/>
                <circle id="umbrella" cx="100" cy="100" r="20" fill="rgb(156 163 175 / 0.5)" stroke="rgb(107 114 128)" stroke-width="1.5" style="pointer-events: none;"/>
            </svg>

            <!-- Dynamic Feedback Overlay -->
            <div id="night-message" class="absolute inset-0 bg-black/60 flex items-center justify-center text-white font-semibold hidden text-xl sm:text-2xl md:text-3xl z-20" style="pointer-events: none;">
                <p>It's Nighttime!</p>
            </div>
            <div id="loader" class="absolute inset-0 bg-gray-900/80 flex items-center justify-center z-30">
                <div class="loader"></div>
            </div>

            <!-- Floating UI Overlays -->
            <div class="absolute bottom-2 md:bottom-4 left-2 md:left-4 grid grid-cols-[auto_1fr] gap-x-1.5 md:gap-x-2 gap-y-1.5 md:gap-y-2 items-center z-20 pointer-events-auto w-[45%] max-w-[180px] md:max-w-[220px]">
                <button id="getLocationBtn" title="Get Current Location" class="p-1.5 md:p-2 rounded-md bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                    <svg class="w-4 h-4 md:w-5 md:h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <input type="number" id="lat" step="0.0001" class="bg-gray-900/80 backdrop-blur-md rounded-md p-1 md:p-1.5 border border-gray-600 w-full text-left text-white text-xs md:text-sm shadow-lg" placeholder="Latitude">
                
                <div class="w-4 h-4 md:w-5 md:h-5 hidden sm:block"></div> 
                <input type="number" id="lon" step="0.0001" class="bg-gray-900/80 backdrop-blur-md rounded-md p-1 md:p-1.5 border border-gray-600 w-full text-left text-white text-xs md:text-sm shadow-lg col-span-2 sm:col-span-1" placeholder="Longitude">
            </div>

            <div class="absolute bottom-2 md:bottom-4 right-2 md:right-4 grid grid-cols-[auto_1fr] gap-x-1.5 md:gap-x-2 gap-y-1.5 md:gap-y-2 items-center z-20 pointer-events-auto w-[50%] max-w-[200px] md:max-w-[240px]">
                <button id="date-reset-btn" title="Set to today" class="p-1.5 md:p-2 rounded-md bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                        <svg class="w-4 h-4 md:w-5 md:h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </button>
                <input type="date" id="date" class="bg-gray-900/80 backdrop-blur-md rounded-md p-1 md:p-1.5 border border-gray-600 w-full text-white text-xs md:text-sm shadow-lg">

                <button id="time-reset-btn" title="Set to current time" class="p-1.5 md:p-2 rounded-md bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                        <svg class="w-4 h-4 md:w-5 md:h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
                <input type="text" id="time-input-box" class="bg-gray-900/80 backdrop-blur-md rounded-md px-1.5 py-1 md:p-1.5 border border-gray-600 w-full text-white text-xs md:text-sm shadow-lg" pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]" placeholder="HH:mm">
                
                <button id="timezone-reset-btn" title="Auto-detect time zone" class="p-1.5 md:p-2 rounded-md bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                        <svg class="w-4 h-4 md:w-5 md:h-5 text-gray-300 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.51 9h16.98M3.51 15h16.98M12 3a9 9 0 015.657 15.343"></path>
                        </svg>
                </button>
                <div class="w-full">
                        <select id="timezone-picker" class="bg-gray-900/80 backdrop-blur-md rounded-md p-1 md:p-1.5 border border-gray-600 w-full text-white text-xs md:text-sm shadow-lg"></select>
                </div>
            </div>
        </div>

        <!-- Bottom Controls (Removed flex-grow and justify-evenly so items stay tightly packed) -->
        <div class="w-full px-4 md:px-6 py-4 md:py-6 flex flex-col space-y-4 md:space-y-6">
            
            <!-- Legend -->
            <div class="flex justify-center items-center flex-wrap gap-x-4 md:gap-x-6 gap-y-2 text-gray-400 text-xs md:text-sm">
                <div class="flex items-center space-x-1.5 md:space-x-2">
                    <span class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-gray-400/50 border border-gray-500"></span>
                    <span>Umbrella</span>
                </div>
                <div class="flex items-center space-x-1.5 md:space-x-2">
                    <span class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-blue-500/50 border border-blue-600"></span>
                    <span>Shade</span>
                </div>
                 <div class="flex items-center space-x-1.5 md:space-x-2">
                    <span class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-blue-500/40"></span>
                    <span>Day's Path</span>
                </div>
                 <div class="flex items-center space-x-1.5 md:space-x-2">
                    <svg viewBox="0 0 12 12" class="w-3 h-3 md:w-4 md:h-4 opacity-100"><path d="M0 6 L12 6 M6 0 L6 12" stroke="currentColor" stroke-width="0.5"></path></svg>
                    <span id="grid-legend-text">2ft Grid</span>
                </div>
            </div>
            
            <!-- Inputs -->
            <div class="space-y-3 md:space-y-4">
                <div class="flex justify-center items-center">
                    <div class="flex items-center border border-gray-600 rounded-md md:rounded-lg overflow-hidden text-sm md:text-base">
                        <button id="unit-imperial" class="px-5 md:px-8 py-1.5 md:py-2 unit-toggle active-unit font-medium">Imperial</button>
                        <button id="unit-metric" class="px-5 md:px-8 py-1.5 md:py-2 unit-toggle font-medium">Metric</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 md:gap-6">
                    <div>
                        <label for="height" id="height-label" class="block font-medium text-gray-300 text-xs md:text-sm mb-1 md:mb-1.5">Height to Edge (ft)</label>
                        <input id="height" type="number" value="5.5" step="0.1" class="w-full p-2 md:p-2.5 rounded-md md:rounded-lg border bg-gray-800 border-gray-600 text-white text-sm md:text-base focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                       <label for="diameter" id="diameter-label" class="block font-medium text-gray-300 text-xs md:text-sm mb-1 md:mb-1.5">Umbrella Dia. (ft)</label>
                       <input id="diameter" type="number" value="5" step="0.1" class="w-full p-2 md:p-2.5 rounded-md md:rounded-lg border bg-gray-800 border-gray-600 text-white text-sm md:text-base focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </div>
            <p id="error-message" class="text-red-500 hidden text-center text-xs md:text-sm font-medium"></p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup Progressive Web App (PWA) Requirements dynamically
            const manifest = {
                "name": "Shade Finder",
                "short_name": "Shade Finder",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#000000",
                "theme_color": "#000000",
                "icons": [{
                    "src": "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'%3E%3Cpath d='M12 2L2 22h20L12 2z'/%3E%3C/svg%3E",
                    "sizes": "192x192",
                    "type": "image/svg+xml"
                }]
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));

            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => self.clients.claim());
                self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
            `;
            if ('serviceWorker' in navigator) {
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(console.error);
            }

            dayjs.extend(window.dayjs_plugin_utc);
            dayjs.extend(window.dayjs_plugin_timezone);

            const heightInput = document.getElementById('height');
            const diameterInput = document.getElementById('diameter');
            const timeInputBox = document.getElementById('time-input-box');
            const dateInput = document.getElementById('date');
            
            const svg = document.getElementById('sky');
            const umbrellaSVG = document.getElementById('umbrella');
            const shadowEllipseSVG = document.getElementById('shadow-ellipse');
            const shadowMaskGroup = document.getElementById('shadow-mask-group');
            const hourlyDotsGroup = document.getElementById('hourly-dots-group');
            const nightMessage = document.getElementById('night-message');
            const gridOverlay = document.getElementById('grid-overlay');
            
            const latInput = document.getElementById('lat');
            const lonInput = document.getElementById('lon');
            const getLocationBtn = document.getElementById('getLocationBtn');
            
            const zoomInBtn = document.getElementById('zoom-in-btn');
            const zoomOutBtn = document.getElementById('zoom-out-btn');

            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');
            
            const centerPosText = document.getElementById('center-pos-text');
            const shadeDimsText = document.getElementById('shade-dims-text');

            const heightLabel = document.getElementById('height-label');
            const diameterLabel = document.getElementById('diameter-label');
            
            const dateResetBtn = document.getElementById('date-reset-btn');
            const timeResetBtn = document.getElementById('time-reset-btn');
            const timezonePicker = document.getElementById('timezone-picker');
            const timezoneResetBtn = document.getElementById('timezone-reset-btn');
            
            const unitImperialBtn = document.getElementById('unit-imperial');
            const unitMetricBtn = document.getElementById('unit-metric');
            const gridLegendText = document.getElementById('grid-legend-text');

            const VIEWBOX_SIZE = 200;
            const FEET_TO_METERS = 0.3048;
            const METERS_TO_FEET = 3.28084;
            const MIN_ALTITUDE_RAD = 0.0872665; 

            let isDragging = false;
            let dailySunPath = [];
            let lastMapLat = null, lastMapLon = null, lastMapScale = null;
            let currentUnitSystem = 'imperial';
            let map = null;
            let userZoomMultiplier = 1.0;
            
            function getCombinedDate() {
                const dateStr = dateInput.value;
                const timeStr = timeInputBox.value;
                if (!dateStr || !timeStr) return new Date();

                const isoStr = `${dateStr}T${timeStr}`;
                const selectedTimezone = timezonePicker.value;

                return dayjs.tz(isoStr, selectedTimezone).toDate();
            }

            function setUnitSystem(system) {
                if (system === currentUnitSystem) return; 

                const heightVal = parseFloat(heightInput.value);
                const diameterVal = parseFloat(diameterInput.value);

                if (system === 'metric') {
                    unitMetricBtn.classList.add('active-unit');
                    unitImperialBtn.classList.remove('active-unit');
                    if (!isNaN(heightVal)) heightInput.value = (heightVal * FEET_TO_METERS).toFixed(2);
                    if (!isNaN(diameterVal)) diameterInput.value = (diameterVal * FEET_TO_METERS).toFixed(2);
                    heightLabel.textContent = 'Height to Edge (m)';
                    diameterLabel.textContent = 'Umbrella Dia. (m)';
                    gridLegendText.textContent = '0.6m Grid';
                } else { // imperial
                    unitImperialBtn.classList.add('active-unit');
                    unitMetricBtn.classList.remove('active-unit');
                    if (!isNaN(heightVal)) heightInput.value = (heightVal * METERS_TO_FEET).toFixed(1);
                    if (!isNaN(diameterVal)) diameterInput.value = (diameterVal * METERS_TO_FEET).toFixed(1);
                    heightLabel.textContent = 'Height to Edge (ft)';
                    diameterLabel.textContent = 'Umbrella Dia. (ft)';
                    gridLegendText.textContent = '2ft Grid';
                }
                currentUnitSystem = system;
                calculateAndDraw();
            }
            
            function populateTimezonePicker() {
                const selectedDate = dateInput.value ? new Date(dateInput.value + 'T12:00:00Z') : new Date();
                const allTimezones = Intl.supportedValuesOf('timeZone');
                const currentSelectedTz = timezonePicker.value;
                timezonePicker.innerHTML = '';

                const tzMap = new Map();

                allTimezones.forEach(tz => {
                    try {
                        const formatter = new Intl.DateTimeFormat('en-US', {
                            timeZone: tz,
                            timeZoneName: 'short'
                        });
                        const parts = formatter.formatToParts(selectedDate);
                        const tzNamePart = parts.find(part => part.type === 'timeZoneName');

                        if (tzNamePart) {
                            tzMap.set(tz, `${tz.split('/').pop().replace(/_/g, ' ')} (${tzNamePart.value})`);
                        }
                    } catch (e) { /* Ignore invalid timezones */ }
                });
                
                const sortedTzs = [...tzMap.entries()].sort((a, b) => a[1].localeCompare(b[1]));

                sortedTzs.forEach(([value, text]) => {
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = text;
                    timezonePicker.appendChild(option);
                });
                
                try {
                    timezonePicker.value = currentSelectedTz || dayjs.tz.guess();
                } catch (e) {
                    if(timezonePicker.options.length > 0) {
                         timezonePicker.selectedIndex = 0;
                       }
                }
            }
            
            function updateMapBounds(lat, lon, scale) {
                const viewboxWidthInFeet = VIEWBOX_SIZE / scale;
                const feetPerDegree = 364000;
                const cosLat = Math.max(0.01, Math.cos(lat * Math.PI / 180));
                
                // Converting SVG bounds width into lat/lon boundaries
                const deltaLon = (viewboxWidthInFeet / (feetPerDegree * cosLat)) / 2;
                const deltaLat = (viewboxWidthInFeet / feetPerDegree) / 2;

                const bounds = [
                    [lat - deltaLat, lon - deltaLon], // SW
                    [lat + deltaLat, lon + deltaLon]  // NE
                ];
                
                if (!map) {
                    map = L.map('leaflet-bg', {
                        zoomControl: false,
                        dragging: false,
                        scrollWheelZoom: false,
                        doubleClickZoom: false,
                        touchZoom: false,
                        keyboard: false,
                        zoomSnap: 0, 
                        zoomAnimation: false,
                        attributionControl: false
                    });
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxNativeZoom: 19, // Use max zoom 19, stretch it for anything deeper
                        maxZoom: 25,       // Allow stretching to very close zooms
                        attribution: '© OpenStreetMap'
                    }).addTo(map);
                }
                
                // Forces map to perfectly match the SVG square
                map.fitBounds(bounds, { animate: false, padding: [0, 0] });
                map.invalidateSize();
            }

            // Ensures map adapts to window resizing
            window.addEventListener('resize', () => {
                if (map) map.invalidateSize();
            });

            function calculateAndDraw() {
                errorMessage.classList.add('hidden');
                
                const heightVal = parseFloat(heightInput.value);
                const diameterVal = parseFloat(diameterInput.value);
                const userLat = parseFloat(latInput.value);
                const userLon = parseFloat(lonInput.value);
                
                if (isNaN(heightVal) || isNaN(diameterVal) || isNaN(userLat) || isNaN(userLon)) {
                    errorMessage.textContent = 'Please enter valid numbers for dimensions and location.';
                    errorMessage.classList.remove('hidden');
                    return;
                }
                
                const heightInFeet = currentUnitSystem === 'imperial' ? heightVal : heightVal * METERS_TO_FEET;
                const diameterInFeet = currentUnitSystem === 'imperial' ? diameterVal : diameterVal * METERS_TO_FEET;
                
                const sunTimesForScale = SunCalc.getTimes(getCombinedDate(), userLat, userLon);
                let minAltitudeForScale = MIN_ALTITUDE_RAD; 

                if (sunTimesForScale.sunrise instanceof Date && !isNaN(sunTimesForScale.sunrise)) {
                    const sunrisePlusOneMinute = new Date(sunTimesForScale.sunrise.getTime() + 60000);
                    const sunrisePos = SunCalc.getPosition(sunrisePlusOneMinute, userLat, userLon);
                    
                    if (sunrisePos.altitude > 0) {
                        minAltitudeForScale = sunrisePos.altitude;
                    }
                }

                const safeAltitude = Math.max(minAltitudeForScale, MIN_ALTITUDE_RAD);
                const maxShadowOffset = heightInFeet / Math.tan(safeAltitude);

                const maxElongatedRadius = (diameterInFeet / 2) / Math.sin(minAltitudeForScale);
                const maxExtent = maxShadowOffset + maxElongatedRadius;

                // Base calculation, perfectly framing the path
                const maxDim = maxExtent * 0.6655; 
                let baseScale = VIEWBOX_SIZE / (maxDim * 1.1);
                
                // Apply the user's manual zoom adjustments
                const scale = baseScale * userZoomMultiplier;
                
                if (userLat !== lastMapLat || userLon !== lastMapLon || scale !== lastMapScale) {
                    updateMapBounds(userLat, userLon, scale);
                    lastMapLat = userLat;
                    lastMapLon = userLon;
                    lastMapScale = scale;
                }

                const radiusScaled = (diameterInFeet / 2) * scale;
                umbrellaSVG.setAttribute('r', radiusScaled);

                gridOverlay.innerHTML = '';
                const gridSpacingFeet = 2;
                const gridSpacingSVG = gridSpacingFeet * scale;
                for (let x = 100; x < VIEWBOX_SIZE; x += gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x); line.setAttribute('y1', 0); line.setAttribute('x2', x); line.setAttribute('y2', VIEWBOX_SIZE);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                 for (let x = 100 - gridSpacingSVG; x > 0; x -= gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x); line.setAttribute('y1', 0); line.setAttribute('x2', x); line.setAttribute('y2', VIEWBOX_SIZE);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                 for (let y = 100; y < VIEWBOX_SIZE; y += gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', 0); line.setAttribute('y1', y); line.setAttribute('x2', VIEWBOX_SIZE); line.setAttribute('y2', y);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                 for (let y = 100 - gridSpacingSVG; y > 0; y -= gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', 0); line.setAttribute('y1', y); line.setAttribute('x2', VIEWBOX_SIZE); line.setAttribute('y2', y);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                
                const now = getCombinedDate();
                let sunPosition = SunCalc.getPosition(now, userLat, userLon);
                if (sunPosition.altitude > (Math.PI / 2) - 0.01) { 
                    const pastPos = SunCalc.getPosition(new Date(now.getTime() - 60000), userLat, userLon);
                    sunPosition.azimuth = pastPos.azimuth;
                }
                const sunTimes = SunCalc.getTimes(now, userLat, userLon);
                
                const sunIndicator = document.getElementById('sun-indicator');

                hourlyDotsGroup.innerHTML = ''; 
                if (sunTimes.sunrise instanceof Date && !isNaN(sunTimes.sunrise)) {
                    let hourMarker = new Date(sunTimes.sunrise);
                    if (hourMarker.getMinutes() !== 0 || hourMarker.getSeconds() !== 0 || hourMarker.getMilliseconds() !== 0) {
                        hourMarker.setHours(hourMarker.getHours() + 1);
                        hourMarker.setMinutes(0, 0, 0);
                    }
                    while (hourMarker < sunTimes.sunset) {
                        let pos = SunCalc.getPosition(hourMarker, userLat, userLon);
                        if (pos.altitude > (Math.PI / 2) - 0.01) {
                            const pastPos = SunCalc.getPosition(new Date(hourMarker.getTime() - 60000), userLat, userLon);
                            pos.azimuth = pastPos.azimuth;
                        }

                        if (pos.altitude > 0) {
                            const offset = (heightInFeet / Math.tan(pos.altitude)) * scale;
                            const shadowX = 100 + offset * Math.sin(pos.azimuth);
                            const shadowY = 100 - offset * Math.cos(pos.azimuth);

                            const hourText = String(hourMarker.getHours()).padStart(2, '0');
                            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                            text.setAttribute('x', shadowX.toFixed(2));
                            text.setAttribute('y', shadowY.toFixed(2));
                            text.setAttribute('fill', 'white');
                            text.setAttribute('fill-opacity', '0.8');
                            text.setAttribute('font-size', '4');
                            text.setAttribute('font-weight', '500');
                            text.setAttribute('text-anchor', 'middle');
                            text.setAttribute('dominant-baseline', 'middle');
                            text.textContent = hourText;
                            hourlyDotsGroup.appendChild(text);
                        }
                        hourMarker.setHours(hourMarker.getHours() + 1);
                    }
                }
                
                dailySunPath = []; 
                shadowMaskGroup.innerHTML = ''; 

                const stepMinutes = 1; 
                
                if (sunTimes.sunrise instanceof Date && !isNaN(sunTimes.sunrise)) {
                    let currentTime = new Date(sunTimes.sunrise);
                    while (currentTime <= sunTimes.sunset) {
                        let pos = SunCalc.getPosition(currentTime, userLat, userLon);
                        
                        if (pos.altitude > (Math.PI / 2) - 0.01) {
                            const pastPos = SunCalc.getPosition(new Date(currentTime.getTime() - 60000), userLat, userLon);
                            pos.azimuth = pastPos.azimuth;
                        }

                        if (pos.altitude > MIN_ALTITUDE_RAD) {
                            const offset = (heightInFeet / Math.tan(pos.altitude)) * scale;
                            const shadowX = 100 + offset * Math.sin(pos.azimuth);
                            const shadowY = 100 - offset * Math.cos(pos.azimuth);
                            
                            const rotationRad = pos.azimuth;
                            const elongatedRadius = radiusScaled / Math.sin(pos.altitude);
                            const rotationDegrees = rotationRad * (180 / Math.PI);

                            const el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                            el.setAttribute('cx', shadowX.toFixed(2));
                            el.setAttribute('cy', shadowY.toFixed(2));
                            el.setAttribute('rx', radiusScaled.toFixed(2));
                            el.setAttribute('ry', elongatedRadius.toFixed(2));
                            el.setAttribute('transform', `rotate(${rotationDegrees.toFixed(2)} ${shadowX.toFixed(2)} ${shadowY.toFixed(2)})`);
                            el.setAttribute('fill', 'white'); 
                            shadowMaskGroup.appendChild(el);

                            const currentMinutes = currentTime.getHours() * 60 + currentTime.getMinutes();
                            dailySunPath.push({ minutes: currentMinutes, center: { x: shadowX, y: shadowY } });
                        }
                        currentTime.setMinutes(currentTime.getMinutes() + stepMinutes);
                    }
                }

                if (sunPosition.altitude < MIN_ALTITUDE_RAD) {
                    sunIndicator.classList.add('hidden');
                    nightMessage.classList.remove('hidden');
                    shadowEllipseSVG.classList.add('hidden');
                    centerPosText.textContent = '';
                    shadeDimsText.textContent = '';
                    return;
                }
                
                sunIndicator.classList.remove('hidden');
                const sunDist = ( (Math.PI / 2) - sunPosition.altitude) / (Math.PI / 2) * 100;
                const sunX = 100 - sunDist * Math.sin(sunPosition.azimuth);
                const sunY = 100 + sunDist * Math.cos(sunPosition.azimuth);

                sunIndicator.setAttribute('cx', sunX);
                sunIndicator.setAttribute('cy', sunY);

                nightMessage.classList.add('hidden');
                shadowEllipseSVG.classList.remove('hidden');
            
                const shadowOffset = (heightInFeet / Math.tan(sunPosition.altitude)) * scale;
                let shadowX = 100 + shadowOffset * Math.sin(sunPosition.azimuth);
                let shadowY = 100 - shadowOffset * Math.cos(sunPosition.azimuth);

                const elongatedRadius = radiusScaled / Math.sin(sunPosition.altitude);
                const rotationRad = sunPosition.azimuth;
                const rotationDegrees = rotationRad * (180 / Math.PI);

                shadowEllipseSVG.setAttribute('cx', shadowX);
                shadowEllipseSVG.setAttribute('cy', shadowY);
                shadowEllipseSVG.setAttribute('rx', radiusScaled);
                shadowEllipseSVG.setAttribute('ry', elongatedRadius);
                shadowEllipseSVG.setAttribute('transform', `rotate(${rotationDegrees} ${shadowX} ${shadowY})`);
                
                const shortAxisFeet = diameterInFeet;
                const longAxisFeet = diameterInFeet / Math.sin(sunPosition.altitude);
                
                const offsetEastWest_feet = (shadowX - 100) / scale;
                const offsetNorthSouth_feet = -(shadowY - 100) / scale;
                
                if (currentUnitSystem === 'imperial') {
                    shadeDimsText.textContent = `Shade Area: ${longAxisFeet.toFixed(1)}' x ${shortAxisFeet.toFixed(1)}'`;
                    const ewText = `${Math.abs(offsetEastWest_feet).toFixed(1)}' ${offsetEastWest_feet >= 0 ? 'E' : 'W'}`;
                    const nsText = `${Math.abs(offsetNorthSouth_feet).toFixed(1)}' ${offsetNorthSouth_feet >= 0 ? 'N' : 'S'}`;
                    centerPosText.textContent = `Center of Shade: ${nsText} & ${ewText}`;
                } else { // metric
                    const shortAxisMeters = shortAxisFeet * FEET_TO_METERS;
                    const longAxisMeters = longAxisFeet * FEET_TO_METERS;
                    const offsetEastWest_meters = offsetEastWest_feet * FEET_TO_METERS;
                    const offsetNorthSouth_meters = offsetNorthSouth_feet * FEET_TO_METERS;

                    shadeDimsText.textContent = `Shade Area: ${longAxisMeters.toFixed(1)}m x ${shortAxisMeters.toFixed(1)}m`;
                    const ewText = `${Math.abs(offsetEastWest_meters).toFixed(1)}m ${offsetEastWest_meters >= 0 ? 'E' : 'W'}`;
                    const nsText = `${Math.abs(offsetNorthSouth_meters).toFixed(1)}m ${offsetNorthSouth_meters >= 0 ? 'N' : 'S'}`;
                    centerPosText.textContent = `Center of Shade: ${nsText} & ${ewText}`;
                }
            }

            function getSVGCoords(e) {
                const pt = svg.createSVGPoint();
                if (e.touches) {
                    pt.x = e.touches[0].clientX;
                    pt.y = e.touches[0].clientY;
                } else {
                    pt.x = e.clientX;
                    pt.y = e.clientY;
                }
                return pt.matrixTransform(svg.getScreenCTM().inverse());
            }

            function findClosestTime(pos) {
                if (dailySunPath.length === 0) return 720; 

                let closest = null;
                let minDistance = Infinity;

                dailySunPath.forEach(point => {
                    const dx = point.center.x - pos.x;
                    const dy = point.center.y - pos.y;
                    const distance = dx * dx + dy * dy;
                    if (distance < minDistance) {
                        minDistance = distance;
                        closest = point;
                    }
                });
                return closest ? closest.minutes : 720;
            }

            function startDrag(e) {
                if (e.target.id === 'shadow-ellipse') {
                    e.preventDefault();
                    isDragging = true;
                }
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();
                const coords = getSVGCoords(e);

                coords.x = Math.max(0, Math.min(VIEWBOX_SIZE, coords.x));
                coords.y = Math.max(0, Math.min(VIEWBOX_SIZE, coords.y));

                const newTimeInMinutes = findClosestTime(coords);
                
                const hours = Math.floor(newTimeInMinutes / 60);
                const minutes = Math.round(newTimeInMinutes % 60);
                timeInputBox.value = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
                
                calculateAndDraw();
            }
            
            function endDrag() {
                isDragging = false;
            }

            function getLocation() {
                loader.style.display = 'flex';
                errorMessage.classList.add('hidden');
                latInput.disabled = true;
                lonInput.disabled = true;
                if (navigator.geolocation) {
                      navigator.geolocation.getCurrentPosition(
                          (position) => {
                              latInput.value = position.coords.latitude.toFixed(4);
                              lonInput.value = position.coords.longitude.toFixed(4);
                              loader.style.display = 'none';
                              latInput.disabled = false;
                              lonInput.disabled = false;
                              calculateAndDraw();
                          },
                          () => handleLocationError("Could not get location. Using default.")
                      );
                } else {
                    handleLocationError("Geolocation not supported. Using default.");
                }
            }

            function handleLocationError(message) {
                  latInput.value = (37.7749).toFixed(4);
                  lonInput.value = (-122.4194).toFixed(4);
                  errorMessage.textContent = message;
                  errorMessage.classList.remove('hidden');
                  loader.style.display = 'none';
                  latInput.disabled = false;
                  lonInput.disabled = false;
                  calculateAndDraw();
            }
            
            // Map Zoom Events
            zoomInBtn.addEventListener('click', () => {
                userZoomMultiplier *= 1.25; // Increase scale
                calculateAndDraw();
            });

            zoomOutBtn.addEventListener('click', () => {
                userZoomMultiplier /= 1.25; // Decrease scale
                calculateAndDraw();
            });

            dateInput.addEventListener('input', () => {
                populateTimezonePicker();
                calculateAndDraw();
            });

            [heightInput, diameterInput, latInput, lonInput, timezonePicker, timeInputBox].forEach(el => {
                if (el) { 
                    el.addEventListener('input', calculateAndDraw);
                }
            });
            
            shadowEllipseSVG.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', endDrag);
            shadowEllipseSVG.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('touchend', endDrag);

            unitImperialBtn.addEventListener('click', () => setUnitSystem('imperial'));
            unitMetricBtn.addEventListener('click', () => setUnitSystem('metric'));

            dateResetBtn.addEventListener('click', () => {
                dateInput.value = dayjs().format('YYYY-MM-DD');
                dateInput.dispatchEvent(new Event('input')); 
            });

            timeResetBtn.addEventListener('click', () => {
                const now = dayjs();
                timeInputBox.value = now.format('HH:mm');
                timezonePicker.value = dayjs.tz.guess();
                calculateAndDraw();
            });
            
            timezoneResetBtn.addEventListener('click', () => {
                timezonePicker.value = dayjs.tz.guess();
                calculateAndDraw();
            });

            getLocationBtn.addEventListener('click', getLocation);

            function initialize() {
                const now = dayjs();
                timeInputBox.value = now.format('HH:mm');
                dateInput.value = now.format('YYYY-MM-DD');

                populateTimezonePicker();

                if (screen.orientation && typeof screen.orientation.lock === 'function') {
                    screen.orientation.lock('portrait-primary').catch(e => {
                        console.warn("Could not lock screen orientation:", e);
                    });
                }
                
                getLocation();
            }

            initialize();
        });
    </script>
</body>
</html>
