<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Shade Finder</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
    
    <!-- Leaflet Map Integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* MATHEMATICAL PROPORTIONAL SCALING ENGINE */
        :root {
            /* Ratio = 1.48 (Header 0.12 + Map 1.00 + Footer 0.36) 
               This perfectly calculates 1 "Unit" (--u) to guarantee it fits entirely inside 96% of the window height.
            */
            --u: calc(min(100vw, 96dvh / 1.48) / 100);
        }

        html, body {
            overscroll-behavior: none; 
            touch-action: pan-x pan-y;
            background-color: black;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            width: 100%; height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; 
        }

        /* Layout Panels */
        .scale-wrapper { 
            width: calc(var(--u) * 100); 
            height: calc(var(--u) * 148); 
            background: black; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-sizing: border-box;
        }
        
        .scale-header { height: calc(var(--u) * 12); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scale-map { width: calc(var(--u) * 100); height: calc(var(--u) * 100); position: relative; overflow: hidden; }
        .scale-footer { height: calc(var(--u) * 36); padding: calc(var(--u) * 3) calc(var(--u) * 4); display: flex; flex-direction: column; justify-content: space-between; }
        
        /* Typography Scaling */
        .text-title { font-size: calc(var(--u) * 5.5); line-height: 1; }
        .text-sub { font-size: calc(var(--u) * 2.4); line-height: 1.2; }
        .text-legend { font-size: calc(var(--u) * 2.8); }
        .text-btn { font-size: calc(var(--u) * 3); }
        .text-input { font-size: calc(var(--u) * 2.8); }
        .text-overlay { font-size: calc(var(--u) * 2.6); }
        .text-night { font-size: calc(var(--u) * 8); }
        .text-error { font-size: calc(var(--u) * 2.6); margin-top: calc(var(--u) * 1.5); }

        /* Component Scaling */
        .legend-line {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: calc(var(--u) * 2.5);
            white-space: nowrap; 
        }
        .legend-icon { width: calc(var(--u) * 3); height: calc(var(--u) * 3); flex-shrink: 0; }
        
        .btn-padding { padding: calc(var(--u) * 1.5) calc(var(--u) * 4); }
        .input-padding { 
            padding: calc(var(--u) * 1) calc(var(--u) * 1.5); 
            height: calc(var(--u) * 6.5);
            border-radius: calc(var(--u) * 1); 
        }
        
        .overlay-btn { padding: calc(var(--u) * 1.5); border-radius: calc(var(--u) * 1.2); }
        .overlay-icon { width: calc(var(--u) * 4); height: calc(var(--u) * 4); }
        .overlay-input { padding: calc(var(--u) * 1.2) calc(var(--u) * 1.5); border-radius: calc(var(--u) * 1.2); height: calc(var(--u) * 7); }
        
        .zoom-btn { width: calc(var(--u) * 8); height: calc(var(--u) * 8); border-radius: calc(var(--u) * 1.5); display: flex; align-items: center; justify-content: center; }
        .zoom-icon { width: calc(var(--u) * 5); height: calc(var(--u) * 5); }
        
        .gap-xs { gap: calc(var(--u) * 1); }
        .gap-sm { gap: calc(var(--u) * 1.5); }
        .gap-md { gap: calc(var(--u) * 3); }
        .gap-lg { gap: calc(var(--u) * 4); }

        /* Map Positioning */
        .pos-overlay-left { bottom: calc(var(--u) * 2); left: calc(var(--u) * 2); width: calc(var(--u) * 45); }
        .pos-overlay-right { bottom: calc(var(--u) * 2); right: calc(var(--u) * 2); width: calc(var(--u) * 48); }
        .pos-zoom { top: calc(var(--u) * 2); right: calc(var(--u) * 2); }

        .loader {
            border: calc(var(--u) * 0.8) solid #4a5568; 
            border-top: calc(var(--u) * 0.8) solid #4299e1;
            border-radius: 50%;
            width: calc(var(--u) * 10);
            height: calc(var(--u) * 10);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Oversized map so corners don't clip when rotated */
        #leaflet-bg { 
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            filter: invert(100%) hue-rotate(180deg) brightness(90%) contrast(120%); 
            transition: transform 0.2s ease-out, opacity 0.3s ease;
            transform-origin: center center;
            z-index: 0;
            opacity: 1;
        }

        /* General Utilities */
        input:disabled { background-color: #2d3748; cursor: not-allowed; color: #718096; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        input[type="time"]::-webkit-calendar-picker-indicator, input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
        
        .unit-toggle { 
            background-color: transparent; 
            transition: background-color 0.2s, color 0.2s; 
            color: #9ca3af; 
        }
        .unit-toggle.active-unit { 
            background-color: #3b82f6; 
            color: #ffffff; 
        }

        #shadow-draggable { cursor: grab; touch-action: none; }
        #shadow-draggable:active { cursor: grabbing; }
        select { scrollbar-width: none; }
        select::-webkit-scrollbar { display: none; }
        .leaflet-control-container { display: none !important; }
    </style>
</head>
<body>
    
    <div class="scale-wrapper" role="main" aria-label="Shade Finder Application">

        <!-- Header -->
        <header class="scale-header z-20 bg-black border-b border-gray-800 flex-shrink-0 relative">
            
            <!-- Vertical Unit Selector (Top Left) -->
            <div class="absolute left-[calc(var(--u)*3)] top-1/2 -translate-y-1/2 flex flex-col border border-gray-600 rounded-[calc(var(--u)*1)] overflow-hidden" role="group" aria-label="Unit selection">
                <button id="unit-imperial" aria-label="Switch to Imperial units (feet)" class="unit-toggle active-unit font-medium text-[calc(var(--u)*2.2)] px-[calc(var(--u)*2)] py-[calc(var(--u)*1)] border-b border-gray-700">Imp</button>
                <button id="unit-metric" aria-label="Switch to Metric units (meters)" class="unit-toggle font-medium text-[calc(var(--u)*2.2)] px-[calc(var(--u)*2)] py-[calc(var(--u)*1)]">Met</button>
            </div>

            <h1 class="font-bold text-blue-400 text-title tracking-tight">Shade Finder</h1>
            <p class="text-gray-400 text-sub mt-[calc(var(--u)*1.5)]">Plan your perfect spot in the shade.</p>
            
            <!-- Install PWA Button (Top Right Corner) -->
            <button id="install-btn" aria-label="Install Shade Finder App to device" class="hidden absolute right-[calc(var(--u)*3)] top-1/2 -translate-y-1/2 items-center gap-xs bg-gray-800 hover:bg-gray-700 text-blue-400 border border-gray-600 px-[calc(var(--u)*2.5)] py-[calc(var(--u)*1.5)] rounded-[calc(var(--u)*1.5)] text-[calc(var(--u)*2.6)] font-medium transition-colors shadow-lg">
                <svg class="w-[calc(var(--u)*3.5)] h-[calc(var(--u)*3.5)]" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11v6m0 0l-3-3m3 3l3-3"></path></svg>
                <span>Install</span>
            </button>
        </header>

        <!-- Map Container -->
        <div class="scale-map bg-gray-900 z-10 flex-shrink-0" id="map-container">
            
            <div id="leaflet-bg" aria-hidden="true"></div>
            
            <!-- Map Zoom & Compass Controls -->
            <div class="absolute pos-zoom flex flex-col gap-sm z-20 pointer-events-auto">
                <button id="zoom-in-btn" aria-label="Zoom map in" title="Zoom In" class="zoom-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg text-white">
                    <svg class="zoom-icon" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12M6 12h12"></path></svg>
                </button>
                <button id="zoom-out-btn" aria-label="Zoom map out" title="Zoom Out" class="zoom-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg text-white">
                    <svg class="zoom-icon" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                </button>
                <button id="compass-btn" aria-label="Toggle compass mode to align map with physical North" title="Toggle Compass" class="zoom-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg text-white transition-colors">
                    <svg class="zoom-icon" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
                <button id="map-toggle-btn" aria-label="Toggle background satellite map visibility" title="Toggle Background Map" class="zoom-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg text-white transition-colors">
                    <svg class="zoom-icon" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                </button>
            </div>

            <!-- SVG Interactive Grid -->
            <svg id="sky" role="img" aria-label="Interactive map grid showing umbrella shadow path" viewBox="0 0 200 200" class="absolute inset-0 w-full h-full z-10 pointer-events-none" style="overflow: visible;">
                <defs>
                    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
                        <feOffset dx="0.5" dy="0.5" result="offsetblur"/>
                        <feFlood flood-color="black" flood-opacity="0.8"/>
                        <feComposite in2="offsetblur" operator="in"/>
                        <feMerge>
                            <feMergeNode/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    
                    <mask id="shadow-mask" maskUnits="userSpaceOnUse" x="-100" y="-100" width="400" height="400">
                        <g id="shadow-mask-group"></g>
                    </mask>
                </defs>
                
                <g id="grid-overlay" aria-hidden="true"></g>
                
                <g id="svg-rotater" style="transform-origin: 100px 100px; transition: transform 0.2s ease-out;">
                    <rect x="-100" y="-100" width="400" height="400" fill="#3b82f6" fill-opacity="0.4" mask="url(#shadow-mask)" style="pointer-events: none;" aria-hidden="true" />

                    <text x="100" y="12" text-anchor="middle" fill="white" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)" aria-hidden="true">N</text>
                    <text x="100" y="196" text-anchor="middle" fill="white" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)" aria-hidden="true">S</text>
                    <text x="6" y="103" fill="white" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)" aria-hidden="true">W</text>
                    <text x="194" y="103" fill="white" class="opacity-80 font-semibold" font-size="8" filter="url(#text-shadow)" aria-hidden="true">E</text>
                    <line x1="100" y1="14" x2="100" y2="20" stroke="white" stroke-width="0.5" class="opacity-50" aria-hidden="true"/>
                    <line x1="100" y1="186" x2="100" y2="180" stroke="white" stroke-width="0.5" class="opacity-50" aria-hidden="true"/>
                    <line x1="14" y1="100" x2="20" y2="100" stroke="white" stroke-width="0.5" class="opacity-50" aria-hidden="true"/>
                    <line x1="186" y1="100" x2="180" y2="100" stroke="white" stroke-width="0.5" class="opacity-50" aria-hidden="true"/>
                    
                    <g id="shadow-draggable" style="pointer-events: auto;" aria-label="Draggable shadow to adjust time" role="button">
                        <ellipse id="shadow-ellipse" cx="100" cy="100" rx="20" ry="20" fill="#3b82f6" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1"/>
                        <polygon id="shadow-poly" class="hidden" fill="#3b82f6" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1"/>
                    </g>

                    <g id="umbrella-group" style="pointer-events: none;" aria-hidden="true">
                        <circle id="umbrella-circle" cx="100" cy="100" r="20" fill="#9ca3af" fill-opacity="0.95" stroke="#4b5563" stroke-width="1.5"/>
                        <polygon id="umbrella-poly" class="hidden" fill="#9ca3af" fill-opacity="0.95" stroke="#4b5563" stroke-width="1.5"/>
                    </g>
                    
                    <circle id="sun-indicator" r="5" fill="#FBBF24" fill-opacity="0.9" stroke="#F59E0B" stroke-width="0.5" aria-hidden="true"/>
                    <g id="hourly-dots-group" aria-hidden="true"></g>
                </g>

                <g id="info-text-group" text-anchor="middle" fill="white" class="font-semibold" font-size="5.5" filter="url(#text-shadow)" aria-hidden="true">
                      <text x="100" y="24">
                          <tspan id="shade-dims-text" x="100" dy="1.4em"></tspan>
                          <tspan id="center-pos-text" x="100" dy="1.4em"></tspan>
                      </text>
                </g>
            </svg>

            <!-- Overlays -->
            <div id="night-message" aria-live="polite" class="absolute inset-0 bg-black/60 flex items-center justify-center text-white font-semibold hidden text-night z-20" style="pointer-events: none;">
                <p>It's Nighttime!</p>
            </div>
            <div id="loader" aria-label="Loading map and location" class="absolute inset-0 bg-gray-900/80 flex items-center justify-center z-30">
                <div class="loader"></div>
            </div>

            <!-- Location Inputs Overlay -->
            <div class="absolute pos-overlay-left grid grid-cols-[auto_1fr] gap-xs items-center z-20 pointer-events-auto">
                <button id="getLocationBtn" aria-label="Get current GPS location" title="Get Current Location" class="overlay-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                    <svg class="overlay-icon text-blue-400" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <input type="number" id="lat" aria-label="Latitude" step="0.0001" class="overlay-input bg-gray-900/80 backdrop-blur-md border border-gray-600 w-full text-left text-white text-overlay shadow-lg" placeholder="Latitude">
                
                <div></div> 
                <input type="number" id="lon" aria-label="Longitude" step="0.0001" class="overlay-input bg-gray-900/80 backdrop-blur-md border border-gray-600 w-full text-left text-white text-overlay shadow-lg" placeholder="Longitude">
            </div>

            <!-- Time Inputs Overlay -->
            <div class="absolute pos-overlay-right grid grid-cols-[auto_1fr] gap-xs items-center z-20 pointer-events-auto">
                <button id="date-reset-btn" aria-label="Reset date to today" title="Set to today" class="overlay-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                        <svg class="overlay-icon text-gray-300" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </button>
                <input type="date" id="date" aria-label="Select Date" class="overlay-input bg-gray-900/80 backdrop-blur-md border border-gray-600 w-full text-white text-overlay shadow-lg">

                <button id="time-reset-btn" aria-label="Reset time to now" title="Set to current time" class="overlay-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                        <svg class="overlay-icon text-gray-300" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
                <input type="text" id="time-input-box" aria-label="Enter time in 24 hour format" class="overlay-input bg-gray-900/80 backdrop-blur-md border border-gray-600 w-full text-white text-overlay shadow-lg" pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]" placeholder="HH:mm">
                
                <button id="timezone-reset-btn" aria-label="Reset timezone to local device timezone" title="Auto-detect time zone" class="overlay-btn bg-gray-900/80 backdrop-blur-md hover:bg-gray-700 border border-gray-600 shadow-lg">
                        <svg class="overlay-icon text-gray-300 transform rotate-90" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.51 9h16.98M3.51 15h16.98M12 3a9 9 0 015.657 15.343"></path>
                        </svg>
                </button>
                <select id="timezone-picker" aria-label="Select Timezone" class="overlay-input bg-gray-900/80 backdrop-blur-md border border-gray-600 w-full text-white text-overlay shadow-lg"></select>
            </div>
        </div>

        <!-- Footer -->
        <footer class="scale-footer flex-shrink-0">
            
            <div class="legend-line text-gray-400 text-legend" aria-hidden="true">
                <div class="flex items-center gap-xs">
                    <span class="legend-icon rounded-full bg-gray-400/50 border border-gray-500"></span>
                    <span>Umbrella</span>
                </div>
                <div class="flex items-center gap-xs">
                    <span class="legend-icon rounded-full bg-blue-500/50 border border-blue-600"></span>
                    <span>Shade</span>
                </div>
                 <div class="flex items-center gap-xs">
                    <span class="legend-icon rounded-full bg-blue-500/40"></span>
                    <span>Day's Path</span>
                </div>
                 <div class="flex items-center gap-xs">
                    <svg viewBox="0 0 12 12" class="legend-icon opacity-100"><path d="M0 6 L12 6 M6 0 L6 12" stroke="currentColor" stroke-width="0.5"></path></svg>
                    <span id="grid-legend-text">2ft Grid</span>
                </div>
            </div>

            <!-- Dimensions Grid -->
            <div class="grid grid-cols-2 gap-x-[calc(var(--u)*4)] gap-y-[calc(var(--u)*1.5)] w-full">
                <div>
                    <label class="block font-medium text-gray-300 text-sub mb-[calc(var(--u)*1)] truncate">Shape</label>
                    <select id="shape" class="w-full input-padding border bg-gray-800 border-gray-600 text-white text-input focus:ring-blue-500 focus:border-blue-500">
                        <option value="circle">Circle</option>
                        <option value="polygon">Polygon</option>
                    </select>
                </div>
                <div>
                    <label for="height" id="height-label" class="block font-medium text-gray-300 text-sub mb-[calc(var(--u)*1)] truncate">Height to Edge (ft)</label>
                    <input id="height" type="number" value="5.5" step="0.1" class="w-full input-padding border bg-gray-800 border-gray-600 text-white text-input focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div id="wrapper-dia" class="">
                   <label for="diameter" id="diameter-label" class="block font-medium text-gray-300 text-sub mb-[calc(var(--u)*1)] truncate">Umbrella Dia. (ft)</label>
                   <input id="diameter" type="number" value="5" step="0.1" class="w-full input-padding border bg-gray-800 border-gray-600 text-white text-input focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div id="wrapper-sides" class="hidden">
                   <label for="sides" class="block font-medium text-gray-300 text-sub mb-[calc(var(--u)*1)] truncate">Sides</label>
                   <input id="sides" type="number" value="6" min="3" step="1" class="w-full input-padding border bg-gray-800 border-gray-600 text-white text-input focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div id="wrapper-side-len" class="hidden">
                   <label for="side-length" id="side-length-label" class="block font-medium text-gray-300 text-sub mb-[calc(var(--u)*1)] truncate">Side Len (ft)</label>
                   <input id="side-length" type="number" value="3" step="0.1" class="w-full input-padding border bg-gray-800 border-gray-600 text-white text-input focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            
            <p id="error-message" aria-live="assertive" class="text-red-500 hidden text-center text-error font-medium w-full"></p>
        </footer>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            let mapVisible = true;
            const mapToggleBtn = document.getElementById('map-toggle-btn');
            const leafletBgLayer = document.getElementById('leaflet-bg');

            mapToggleBtn.addEventListener('click', () => {
                mapVisible = !mapVisible;
                leafletBgLayer.style.opacity = mapVisible ? '1' : '0';
                
                if (mapVisible) {
                    mapToggleBtn.classList.add('text-white', 'border-gray-600');
                    mapToggleBtn.classList.remove('text-blue-400', 'border-blue-500');
                } else {
                    mapToggleBtn.classList.remove('text-white', 'border-gray-600');
                    mapToggleBtn.classList.add('text-blue-400', 'border-blue-500');
                }
            });

            let compassActive = false;
            let currentHeading = 0;
            const compassBtn = document.getElementById('compass-btn');
            const leafletBg = document.getElementById('leaflet-bg');
            const svgRotater = document.getElementById('svg-rotater');

            compassBtn.addEventListener('click', async () => {
                if (compassActive) {
                    stopCompass();
                    return;
                }
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            startCompass();
                        }
                    } catch (e) { console.error(e); }
                } else {
                    startCompass();
                }
            });

            function startCompass() {
                compassActive = true;
                compassBtn.classList.remove('text-white', 'border-gray-600');
                compassBtn.classList.add('text-blue-400', 'border-blue-500');
                if ('ondeviceorientationabsolute' in window) {
                    window.addEventListener('deviceorientationabsolute', handleOrientation);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }

            function stopCompass() {
                compassActive = false;
                compassBtn.classList.add('text-white', 'border-gray-600');
                compassBtn.classList.remove('text-blue-400', 'border-blue-500');
                window.removeEventListener('deviceorientationabsolute', handleOrientation);
                window.removeEventListener('deviceorientation', handleOrientation);
                currentHeading = 0;
                leafletBg.style.transform = `rotate(0deg)`;
                svgRotater.style.transform = `rotate(0deg)`;
            }

            function handleOrientation(e) {
                if (!compassActive) return;
                let heading = e.webkitCompassHeading || (360 - e.alpha); 
                if (heading !== null) {
                    let diff = heading - currentHeading;
                    diff = ((diff + 540) % 360) - 180; 
                    currentHeading += diff;
                    leafletBg.style.transform = `rotate(-${currentHeading}deg)`;
                    svgRotater.style.transform = `rotate(-${currentHeading}deg)`;
                }
            }

            let deferredPrompt;
            const installBtn = document.getElementById('install-btn');
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.classList.remove('hidden');
                installBtn.classList.add('flex');
            });
            if(installBtn) {
                installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        await deferredPrompt.userChoice;
                        deferredPrompt = null;
                        installBtn.classList.add('hidden');
                        installBtn.classList.remove('flex');
                    }
                });
            }

            dayjs.extend(window.dayjs_plugin_utc);
            dayjs.extend(window.dayjs_plugin_timezone);

            const heightInput = document.getElementById('height');
            const diameterInput = document.getElementById('diameter');
            const timeInputBox = document.getElementById('time-input-box');
            const dateInput = document.getElementById('date');
            const svg = document.getElementById('sky');
            const umbrellaCircleSVG = document.getElementById('umbrella-circle');
            const umbrellaPolySVG = document.getElementById('umbrella-poly');
            const shadowDraggable = document.getElementById('shadow-draggable');
            const shadowEllipseSVG = document.getElementById('shadow-ellipse');
            const shadowPolySVG = document.getElementById('shadow-poly');
            const shadowMaskGroup = document.getElementById('shadow-mask-group');
            const hourlyDotsGroup = document.getElementById('hourly-dots-group');
            const nightMessage = document.getElementById('night-message');
            const gridOverlay = document.getElementById('grid-overlay');
            const latInput = document.getElementById('lat');
            const lonInput = document.getElementById('lon');
            const getLocationBtn = document.getElementById('getLocationBtn');
            const zoomInBtn = document.getElementById('zoom-in-btn');
            const zoomOutBtn = document.getElementById('zoom-out-btn');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');
            const centerPosText = document.getElementById('center-pos-text');
            const shadeDimsText = document.getElementById('shade-dims-text');
            const shapeSelect = document.getElementById('shape');
            const wrapperDia = document.getElementById('wrapper-dia');
            const wrapperSides = document.getElementById('wrapper-sides');
            const wrapperSideLen = document.getElementById('wrapper-side-len');
            const sidesInput = document.getElementById('sides');
            const sideLengthInput = document.getElementById('side-length');
            const sideLengthLabel = document.getElementById('side-length-label');
            const heightLabel = document.getElementById('height-label');
            const diameterLabel = document.getElementById('diameter-label');
            const dateResetBtn = document.getElementById('date-reset-btn');
            const timeResetBtn = document.getElementById('time-reset-btn');
            const timezonePicker = document.getElementById('timezone-picker');
            const timezoneResetBtn = document.getElementById('timezone-reset-btn');
            const unitImperialBtn = document.getElementById('unit-imperial');
            const unitMetricBtn = document.getElementById('unit-metric');
            const gridLegendText = document.getElementById('grid-legend-text');

            const VIEWBOX_SIZE = 200;
            const FEET_TO_METERS = 0.3048;
            const METERS_TO_FEET = 3.28084;
            const MIN_ALTITUDE_RAD = 0.0872665; 

            let isDragging = false;
            let dailySunPath = [];
            let lastMapLat = null, lastMapLon = null, lastMapScale = null;
            let currentUnitSystem = 'imperial';
            let map = null;
            let userZoomMultiplier = 1.0;
            
            shapeSelect.addEventListener('change', () => {
                if (shapeSelect.value === 'circle') {
                    wrapperDia.classList.remove('hidden');
                    wrapperSides.classList.add('hidden');
                    wrapperSideLen.classList.add('hidden');
                } else {
                    wrapperDia.classList.add('hidden');
                    wrapperSides.classList.remove('hidden');
                    wrapperSideLen.classList.remove('hidden');
                }
                calculateAndDraw();
            });

            function getCombinedDate() {
                const dateStr = dateInput.value;
                const timeStr = timeInputBox.value;
                if (!dateStr || !timeStr) return new Date();
                const isoStr = `${dateStr}T${timeStr}`;
                const selectedTimezone = timezonePicker.value;
                return dayjs.tz(isoStr, selectedTimezone).toDate();
            }

            function setUnitSystem(system) {
                if (system === currentUnitSystem) return; 
                const heightVal = parseFloat(heightInput.value);
                const diameterVal = parseFloat(diameterInput.value);
                const sideLengthVal = parseFloat(sideLengthInput.value);
                if (system === 'metric') {
                    unitMetricBtn.classList.add('active-unit');
                    unitImperialBtn.classList.remove('active-unit');
                    if (!isNaN(heightVal)) heightInput.value = (heightVal * FEET_TO_METERS).toFixed(2);
                    if (!isNaN(diameterVal)) diameterInput.value = (diameterVal * FEET_TO_METERS).toFixed(2);
                    if (!isNaN(sideLengthVal)) sideLengthInput.value = (sideLengthVal * FEET_TO_METERS).toFixed(2);
                    heightLabel.textContent = 'Height to Edge (m)';
                    diameterLabel.textContent = 'Umbrella Dia. (m)';
                    sideLengthLabel.textContent = 'Side Len (m)';
                    gridLegendText.textContent = '0.6m Grid';
                } else {
                    unitImperialBtn.classList.add('active-unit');
                    unitMetricBtn.classList.remove('active-unit');
                    if (!isNaN(heightVal)) heightInput.value = (heightVal * METERS_TO_FEET).toFixed(1);
                    if (!isNaN(diameterVal)) diameterInput.value = (diameterVal * METERS_TO_FEET).toFixed(1);
                    if (!isNaN(sideLengthVal)) sideLengthInput.value = (sideLengthVal * METERS_TO_FEET).toFixed(1);
                    heightLabel.textContent = 'Height to Edge (ft)';
                    diameterLabel.textContent = 'Umbrella Dia. (ft)';
                    sideLengthLabel.textContent = 'Side Len (ft)';
                    gridLegendText.textContent = '2ft Grid';
                }
                currentUnitSystem = system;
                calculateAndDraw();
            }
            
            function populateTimezonePicker() {
                const selectedDate = dateInput.value ? new Date(dateInput.value + 'T12:00:00Z') : new Date();
                const allTimezones = Intl.supportedValuesOf('timeZone');
                const currentSelectedTz = timezonePicker.value;
                timezonePicker.innerHTML = '';
                const tzMap = new Map();
                allTimezones.forEach(tz => {
                    try {
                        const formatter = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'short' });
                        const parts = formatter.formatToParts(selectedDate);
                        const tzNamePart = parts.find(part => part.type === 'timeZoneName');
                        if (tzNamePart) tzMap.set(tz, `${tz.split('/').pop().replace(/_/g, ' ')} (${tzNamePart.value})`);
                    } catch (e) {}
                });
                const sortedTzs = [...tzMap.entries()].sort((a, b) => a[1].localeCompare(b[1]));
                sortedTzs.forEach(([value, text]) => {
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = text;
                    timezonePicker.appendChild(option);
                });
                timezonePicker.value = currentSelectedTz || dayjs.tz.guess();
            }
            
            function updateMapBounds(lat, lon, scale) {
                const viewboxWidthInFeet = VIEWBOX_SIZE / scale;
                const feetPerDegree = 364000;
                const cosLat = Math.max(0.01, Math.cos(lat * Math.PI / 180));
                const mapMultiplier = 1.5; 
                const deltaLon = (viewboxWidthInFeet / (feetPerDegree * cosLat)) / 2 * mapMultiplier;
                const deltaLat = (viewboxWidthInFeet / feetPerDegree) / 2 * mapMultiplier;
                const bounds = [[lat - deltaLat, lon - deltaLon], [lat + deltaLat, lon + deltaLon]];
                if (!map) {
                    map = L.map('leaflet-bg', { zoomControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, touchZoom: false, keyboard: false, zoomSnap: 0, zoomAnimation: false, attributionControl: false });
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxNativeZoom: 19, maxZoom: 25 }).addTo(map);
                }
                map.fitBounds(bounds, { animate: false, padding: [0, 0] });
            }

            function calculateAndDraw() {
                errorMessage.classList.add('hidden');
                
                const shape = shapeSelect.value;
                const heightVal = parseFloat(heightInput.value);
                const userLat = parseFloat(latInput.value);
                const userLon = parseFloat(lonInput.value);
                
                let radiusInFeet = 0;
                let sides = 0;

                function showError(msg) {
                    errorMessage.textContent = msg;
                    errorMessage.classList.remove('hidden');
                }

                if (shape === 'circle') {
                    const diameterVal = parseFloat(diameterInput.value);
                    if (isNaN(heightVal) || isNaN(diameterVal) || isNaN(userLat) || isNaN(userLon)) {
                        return showError('Please enter valid numbers for dimensions and location.');
                    }
                    const diameterInFeet = currentUnitSystem === 'imperial' ? diameterVal : diameterVal * METERS_TO_FEET;
                    radiusInFeet = diameterInFeet / 2;
                } else {
                    sides = parseInt(sidesInput.value, 10);
                    const sideLengthVal = parseFloat(sideLengthInput.value);
                    if (isNaN(heightVal) || isNaN(sides) || sides < 3 || isNaN(sideLengthVal) || isNaN(userLat) || isNaN(userLon)) {
                        return showError('Please enter valid numbers for dimensions and location.');
                    }
                    const sideLengthInFeet = currentUnitSystem === 'imperial' ? sideLengthVal : sideLengthVal * METERS_TO_FEET;
                    radiusInFeet = sideLengthInFeet / (2 * Math.sin(Math.PI / sides));
                }
                
                const heightInFeet = currentUnitSystem === 'imperial' ? heightVal : heightVal * METERS_TO_FEET;
                
                const sunTimesForScale = SunCalc.getTimes(getCombinedDate(), userLat, userLon);
                let minAltitudeForScale = MIN_ALTITUDE_RAD; 

                if (sunTimesForScale.sunrise instanceof Date && !isNaN(sunTimesForScale.sunrise)) {
                    const sunrisePlusOneMinute = new Date(sunTimesForScale.sunrise.getTime() + 60000);
                    const sunrisePos = SunCalc.getPosition(sunrisePlusOneMinute, userLat, userLon);
                    
                    if (sunrisePos.altitude > 0) {
                        minAltitudeForScale = sunrisePos.altitude;
                    }
                }

                const safeAltitude = Math.max(minAltitudeForScale, MIN_ALTITUDE_RAD);
                const safeBaseOffset = heightInFeet / Math.tan(safeAltitude);
                const safeDepthInFeet = radiusInFeet * 0.5;
                const safeApexOffset = (heightInFeet + safeDepthInFeet) / Math.tan(safeAltitude);
                const maxExtent = Math.max(safeBaseOffset + radiusInFeet, safeApexOffset) + radiusInFeet;
                const maxDim = maxExtent * 0.6655; 
                let baseScale = VIEWBOX_SIZE / (maxDim * 1.1);
                const scale = baseScale * userZoomMultiplier;
                
                if (userLat !== lastMapLat || userLon !== lastMapLon || scale !== lastMapScale) {
                    updateMapBounds(userLat, userLon, scale);
                    lastMapLat = userLat;
                    lastMapLon = userLon;
                    lastMapScale = scale;
                }

                const radiusScaled = radiusInFeet * scale;
                if (shape === 'circle') {
                    umbrellaCircleSVG.setAttribute('r', radiusScaled);
                    umbrellaCircleSVG.classList.remove('hidden');
                    umbrellaPolySVG.classList.add('hidden');
                } else {
                    const pts = [];
                    const angleOffset = -Math.PI / 2 - Math.PI / sides;
                    for(let i=0; i<sides; i++) {
                        const angle = angleOffset + (i * 2 * Math.PI / sides);
                        pts.push(`${(100 + radiusScaled * Math.cos(angle)).toFixed(2)},${(100 + radiusScaled * Math.sin(angle)).toFixed(2)}`);
                    }
                    umbrellaPolySVG.setAttribute('points', pts.join(' '));
                    umbrellaCircleSVG.classList.add('hidden');
                    umbrellaPolySVG.classList.remove('hidden');
                }

                // STATIC GRID LAYER (Does not rotate with compass)
                gridOverlay.innerHTML = '';
                const gridSpacingFeet = 2;
                const gridSpacingSVG = gridSpacingFeet * scale;
                for (let x = 100; x < VIEWBOX_SIZE; x += gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x); line.setAttribute('y1', 0); line.setAttribute('x2', x); line.setAttribute('y2', VIEWBOX_SIZE);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                 for (let x = 100 - gridSpacingSVG; x > 0; x -= gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x); line.setAttribute('y1', 0); line.setAttribute('x2', x); line.setAttribute('y2', VIEWBOX_SIZE);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                 for (let y = 100; y < VIEWBOX_SIZE; y += gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', 0); line.setAttribute('y1', y); line.setAttribute('x2', VIEWBOX_SIZE); line.setAttribute('y2', y);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                 for (let y = 100 - gridSpacingSVG; y > 0; y -= gridSpacingSVG) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', 0); line.setAttribute('y1', y); line.setAttribute('x2', VIEWBOX_SIZE); line.setAttribute('y2', y);
                    line.setAttribute('stroke', 'white'); line.setAttribute('stroke-width', '0.25'); line.setAttribute('class', 'opacity-30');
                    gridOverlay.appendChild(line);
                }
                
                function getShadowGeometry(altitude, azimuth) {
                    const baseOffset = (heightInFeet / Math.tan(altitude)) * scale;
                    const depthInFeet = radiusInFeet * 0.5; // Assume umbrella depth is half its radius
                    const apexOffset = ((heightInFeet + depthInFeet) / Math.tan(altitude)) * scale;
                    
                    const baseTrailing = baseOffset - radiusScaled;
                    const leadingEdge = Math.max(baseOffset + radiusScaled, apexOffset);
                    const shadowLength = leadingEdge - baseTrailing;
                    const elongatedRadius = shadowLength / 2;
                    const shiftDistance = ((leadingEdge + baseTrailing) / 2) - baseOffset;
                    
                    const shadowOffset = baseOffset + shiftDistance;
                    const shadowX = 100 + shadowOffset * Math.sin(azimuth);
                    const shadowY = 100 - shadowOffset * Math.cos(azimuth);
                    const scaleY = elongatedRadius / radiusScaled;
                    
                    return { shadowX, shadowY, elongatedRadius, scaleY, shadowLength };
                }
                
                const now = getCombinedDate();
                let sunPosition = SunCalc.getPosition(now, userLat, userLon);
                if (sunPosition.altitude > (Math.PI / 2) - 0.01) { 
                    const pastPos = SunCalc.getPosition(new Date(now.getTime() - 60000), userLat, userLon);
                    sunPosition.azimuth = pastPos.azimuth;
                }
                const sunTimes = SunCalc.getTimes(now, userLat, userLon);
                
                const sunIndicator = document.getElementById('sun-indicator');

                hourlyDotsGroup.innerHTML = ''; 
                if (sunTimes.sunrise instanceof Date && !isNaN(sunTimes.sunrise)) {
                    let hourMarker = new Date(sunTimes.sunrise);
                    if (hourMarker.getMinutes() !== 0 || hourMarker.getSeconds() !== 0 || hourMarker.getMilliseconds() !== 0) {
                        hourMarker.setHours(hourMarker.getHours() + 1);
                        hourMarker.setMinutes(0, 0, 0);
                    }
                    while (hourMarker < sunTimes.sunset) {
                        let pos = SunCalc.getPosition(hourMarker, userLat, userLon);
                        if (pos.altitude > (Math.PI / 2) - 0.01) {
                            const pastPos = SunCalc.getPosition(new Date(hourMarker.getTime() - 60000), userLat, userLon);
                            pos.azimuth = pastPos.azimuth;
                        }

                        if (pos.altitude > 0) {
                            const { shadowX, shadowY } = getShadowGeometry(pos.altitude, pos.azimuth);

                            const hourText = String(hourMarker.getHours()).padStart(2, '0');
                            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                            text.setAttribute('x', shadowX.toFixed(2));
                            text.setAttribute('y', shadowY.toFixed(2));
                            text.setAttribute('fill', 'white');
                            text.setAttribute('fill-opacity', '1');
                            text.setAttribute('font-size', '4.5');
                            text.setAttribute('font-weight', '600');
                            text.setAttribute('text-anchor', 'middle');
                            text.setAttribute('dominant-baseline', 'middle');
                            text.setAttribute('filter', 'url(#text-shadow)');
                            text.textContent = hourText;
                            hourlyDotsGroup.appendChild(text);
                        }
                        hourMarker.setHours(hourMarker.getHours() + 1);
                    }
                }
                
                dailySunPath = []; 
                shadowMaskGroup.innerHTML = ''; 
                const stepMinutes = 1; 
                
                if (sunTimes.sunrise instanceof Date && !isNaN(sunTimes.sunrise)) {
                    let currentTime = new Date(sunTimes.sunrise);
                    while (currentTime <= sunTimes.sunset) {
                        let pos = SunCalc.getPosition(currentTime, userLat, userLon);
                        if (pos.altitude > (Math.PI / 2) - 0.01) {
                            const pastPos = SunCalc.getPosition(new Date(currentTime.getTime() - 60000), userLat, userLon);
                            pos.azimuth = pastPos.azimuth;
                        }
                        if (pos.altitude > MIN_ALTITUDE_RAD) {
                            const { shadowX, shadowY, elongatedRadius, scaleY } = getShadowGeometry(pos.altitude, pos.azimuth);
                            
                            if (shape === 'circle') {
                                const rotationDegrees = pos.azimuth * (180 / Math.PI);
                                const el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                                el.setAttribute('cx', shadowX.toFixed(2));
                                el.setAttribute('cy', shadowY.toFixed(2));
                                el.setAttribute('rx', radiusScaled.toFixed(2));
                                el.setAttribute('ry', elongatedRadius.toFixed(2));
                                el.setAttribute('transform', `rotate(${rotationDegrees.toFixed(2)} ${shadowX.toFixed(2)} ${shadowY.toFixed(2)})`);
                                el.setAttribute('fill', 'white'); 
                                shadowMaskGroup.appendChild(el);
                            } else {
                                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                                const pts = [];
                                const angleOffset = -Math.PI / 2 - Math.PI / sides;
                                const alpha = pos.azimuth;
                                const scaleY = elongatedRadius / radiusScaled;
                                
                                for(let i=0; i<sides; i++) {
                                    const angle = angleOffset + (i * 2 * Math.PI / sides);
                                    const vx = radiusScaled * Math.cos(angle);
                                    const vy = radiusScaled * Math.sin(angle);
                                    
                                    const rx = vx * Math.cos(-alpha) - vy * Math.sin(-alpha);
                                    const ry = vx * Math.sin(-alpha) + vy * Math.cos(-alpha);
                                    
                                    const sx = rx;
                                    const sy = ry * scaleY;
                                    
                                    const fx = sx * Math.cos(alpha) - sy * Math.sin(alpha);
                                    const fy = sx * Math.sin(alpha) + sy * Math.cos(alpha);
                                    
                                    pts.push(`${(shadowX + fx).toFixed(2)},${(shadowY + fy).toFixed(2)}`);
                                }
                                poly.setAttribute('points', pts.join(' '));
                                poly.setAttribute('fill', 'white');
                                shadowMaskGroup.appendChild(poly);
                            }
                            
                            const currentMinutes = currentTime.getHours() * 60 + currentTime.getMinutes();
                            dailySunPath.push({ minutes: currentMinutes, center: { x: shadowX, y: shadowY } });
                        }
                        currentTime.setMinutes(currentTime.getMinutes() + stepMinutes);
                    }
                }

                if (sunPosition.altitude < MIN_ALTITUDE_RAD) {
                    sunIndicator.classList.add('hidden');
                    nightMessage.classList.remove('hidden');
                    shadowDraggable.classList.add('hidden');
                    centerPosText.textContent = '';
                    shadeDimsText.textContent = '';
                    return;
                }
                
                sunIndicator.classList.remove('hidden');
                const sunDist = ( (Math.PI / 2) - sunPosition.altitude) / (Math.PI / 2) * 100;
                sunIndicator.setAttribute('cx', 100 - sunDist * Math.sin(sunPosition.azimuth));
                sunIndicator.setAttribute('cy', 100 + sunDist * Math.cos(sunPosition.azimuth));

                nightMessage.classList.add('hidden');
                shadowDraggable.classList.remove('hidden');
            
                const { shadowX, shadowY, elongatedRadius, scaleY, shadowLength } = getShadowGeometry(sunPosition.altitude, sunPosition.azimuth);
                const rotDeg = sunPosition.azimuth * 180 / Math.PI;

                if (shape === 'circle') {
                    shadowEllipseSVG.setAttribute('cx', shadowX);
                    shadowEllipseSVG.setAttribute('cy', shadowY);
                    shadowEllipseSVG.setAttribute('rx', radiusScaled);
                    shadowEllipseSVG.setAttribute('ry', elongatedRadius);
                    shadowEllipseSVG.setAttribute('transform', `rotate(${rotDeg} ${shadowX} ${shadowY})`);
                    
                    shadowEllipseSVG.classList.remove('hidden');
                    shadowPolySVG.classList.add('hidden');
                } else {
                    const pts = [];
                    const angleOffset = -Math.PI / 2 - Math.PI / sides;
                    const alpha = sunPosition.azimuth;
                    const scaleY = elongatedRadius / radiusScaled;

                    for(let i=0; i<sides; i++) {
                        const angle = angleOffset + (i * 2 * Math.PI / sides);
                        const vx = radiusScaled * Math.cos(angle);
                        const vy = radiusScaled * Math.sin(angle);
                        
                        const rx = vx * Math.cos(-alpha) - vy * Math.sin(-alpha);
                        const ry = vx * Math.sin(-alpha) + vy * Math.cos(-alpha);
                        
                        const sx = rx;
                        const sy = ry * scaleY;
                        
                        const fx = sx * Math.cos(alpha) - sy * Math.sin(alpha);
                        const fy = sx * Math.sin(alpha) + sy * Math.cos(alpha);
                        
                        pts.push(`${(shadowX + fx).toFixed(2)},${(shadowY + fy).toFixed(2)}`);
                    }
                    shadowPolySVG.setAttribute('points', pts.join(' '));
                    shadowPolySVG.removeAttribute('transform');
                    
                    shadowEllipseSVG.classList.add('hidden');
                    shadowPolySVG.classList.remove('hidden');
                }
                
                const shortAxisFeet = radiusInFeet * 2;
                const longAxisFeet = shadowLength / scale;
                const offsetEastWest_feet = (shadowX - 100) / scale;
                const offsetNorthSouth_feet = -(shadowY - 100) / scale;
                
                const u = currentUnitSystem === 'imperial' ? "'" : "m";
                const factor = currentUnitSystem === 'imperial' ? 1 : FEET_TO_METERS;

                shadeDimsText.textContent = `Shade: ${(longAxisFeet * factor).toFixed(1)}${u} x ${(shortAxisFeet * factor).toFixed(1)}${u}`;
                centerPosText.textContent = `Offset: ${Math.abs(offsetNorthSouth_feet * factor).toFixed(1)}${u} ${offsetNorthSouth_feet >= 0 ? 'N' : 'S'} & ${Math.abs(offsetEastWest_feet * factor).toFixed(1)}${u} ${offsetEastWest_feet >= 0 ? 'E' : 'W'}`;
            }

            function getSVGCoords(e) {
                const pt = svg.createSVGPoint();
                const client = e.touches ? e.touches[0] : e;
                pt.x = client.clientX; pt.y = client.clientY;
                return pt.matrixTransform(svgRotater.getScreenCTM().inverse());
            }

            function drag(e) {
                if (!isDragging || dailySunPath.length === 0) return;
                const coords = getSVGCoords(e);
                let closest = dailySunPath[0], minDist = Infinity;
                dailySunPath.forEach(p => {
                    const d = Math.pow(p.center.x - coords.x, 2) + Math.pow(p.center.y - coords.y, 2);
                    if (d < minDist) { minDist = d; closest = p; }
                });
                timeInputBox.value = `${String(Math.floor(closest.minutes/60)).padStart(2, '0')}:${String(closest.minutes%60).padStart(2, '0')}`;
                calculateAndDraw();
            }

            function getLocation() {
                loader.style.display = 'flex';
                navigator.geolocation.getCurrentPosition(pos => {
                    latInput.value = pos.coords.latitude.toFixed(4); lonInput.value = pos.coords.longitude.toFixed(4);
                    loader.style.display = 'none'; calculateAndDraw();
                }, () => {
                    latInput.value = "37.7749"; lonInput.value = "-122.4194";
                    loader.style.display = 'none'; calculateAndDraw();
                });
            }

            zoomInBtn.addEventListener('click', () => { userZoomMultiplier *= 1.25; calculateAndDraw(); });
            zoomOutBtn.addEventListener('click', () => { userZoomMultiplier /= 1.25; calculateAndDraw(); });
            dateInput.addEventListener('input', () => { populateTimezonePicker(); calculateAndDraw(); });
            [heightInput, diameterInput, sidesInput, sideLengthInput, latInput, lonInput, timezonePicker, timeInputBox].forEach(el => el.addEventListener('input', calculateAndDraw));
            shadowDraggable.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', () => isDragging = false);
            shadowDraggable.addEventListener('touchstart', (e) => { e.preventDefault(); isDragging = true; }, { passive: false });
            document.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); drag(e); }, { passive: false });
            document.addEventListener('touchend', () => isDragging = false);
            unitImperialBtn.addEventListener('click', () => setUnitSystem('imperial'));
            unitMetricBtn.addEventListener('click', () => setUnitSystem('metric'));
            dateResetBtn.addEventListener('click', () => { dateInput.value = dayjs().format('YYYY-MM-DD'); populateTimezonePicker(); calculateAndDraw(); });
            timeResetBtn.addEventListener('click', () => { timeInputBox.value = dayjs().format('HH:mm'); calculateAndDraw(); });
            timezoneResetBtn.addEventListener('click', () => { timezonePicker.value = dayjs.tz.guess(); calculateAndDraw(); });
            getLocationBtn.addEventListener('click', getLocation);
            const initNow = dayjs();
            timeInputBox.value = initNow.format('HH:mm'); dateInput.value = initNow.format('YYYY-MM-DD');
            populateTimezonePicker(); getLocation();
        });
    </script>
</body>
</html>
