<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - Moonlight Tracker & Gem Vault</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React, ReactDOM, and Babel CDNs for standalone browser compilation -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
    /* Space scrollbar styling to match the deep galaxy aesthetic */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #020617; /* Slate 950 */
      border-left: 1px solid #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #312e81; /* Indigo 900 */
      border-radius: 9999px;
      border: 2px solid #020617;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4f46e5; /* Indigo 600 */
    }
    html {
      scrollbar-width: thin;
      scrollbar-color: #312e81 #020617;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

  <!-- React Root Container -->
  <div id="root" class="flex-1 flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Crystal Database
    const CRYSTAL_PROFILES = {
      Moonstone: {
        name: "Moonstone",
        ruledBy: "The Moon",
        rate: 2.0, // Base multiplier
        sensitiveToSun: false,
        color: "from-blue-200 to-indigo-300",
        glowColor: "shadow-blue-400/50",
        description: "Channels lunar energy. Highly receptive; reaches peak alignment rapidly."
      },
      Selenite: {
        name: "Selenite",
        ruledBy: "The Moon",
        rate: 1.8,
        sensitiveToSun: false,
        color: "from-slate-100 to-teal-100",
        glowColor: "shadow-teal-200/50",
        description: "Self-cleansing core that amplifies incoming light to surrounding objects."
      },
      Amethyst: {
        name: "Amethyst",
        ruledBy: "Jupiter/Neptune",
        rate: 1.0,
        sensitiveToSun: true, // Will trigger solar warnings
        color: "from-purple-400 to-indigo-600",
        glowColor: "shadow-purple-500/50",
        description: "Deep spiritual connection. Highly UV-sensitive; bring indoors before sun up."
      },
      RoseQuartz: {
        name: "Rose Quartz",
        ruledBy: "Venus",
        rate: 1.0,
        sensitiveToSun: true,
        color: "from-pink-300 to-rose-400",
        glowColor: "shadow-rose-300/50",
        description: "Stone of unconditional love. Sunlight slowly fades its gentle pink hues."
      },
      Labradorite: {
        name: "Labradorite",
        ruledBy: "Uranus",
        rate: 1.4,
        sensitiveToSun: false,
        color: "from-cyan-700 to-emerald-800",
        glowColor: "shadow-cyan-500/50",
        description: "Stone of magic and intuition. Loves high-efficiency crescent cycles."
      },
      Obsidian: {
        name: "Black Obsidian",
        ruledBy: "Pluto",
        rate: 1.2,
        sensitiveToSun: false,
        color: "from-gray-800 to-black",
        glowColor: "shadow-slate-600/50",
        description: "Grounding shield. Clears debris, absorbing deep night lunar currents."
      }
    };

    // Client-side light pollution database approximation
    const estimateBortleAndRegion = (lat, lon) => {
      const referenceHubs = [
        { name: "New York City", lat: 40.7128, lon: -74.0060, bortle: 9 },
        { name: "London", lat: 51.5074, lon: -0.1278, bortle: 8 },
        { name: "San Francisco", lat: 37.7749, lon: -122.4194, bortle: 8 },
        { name: "Tokyo", lat: 35.6762, lon: 139.6503, bortle: 9 },
        { name: "Paris", lat: 48.8566, lon: 2.3522, bortle: 8 },
        { name: "Sydney", lat: -33.8688, lon: 151.2093, bortle: 7 },
        { name: "Cairo", lat: 30.0444, lon: 31.2357, bortle: 9 },
        { name: "Reykjavik", lat: 64.1466, lon: -21.9426, bortle: 4 },
        { name: "Mauna Kea Peak", lat: 19.8206, lon: -155.4681, bortle: 1 },
        { name: "Atacama Region", lat: -23.8634, lon: -69.1328, bortle: 1 }
      ];

      let minDistance = Infinity;
      let nearestHub = null;

      referenceHubs.forEach(hub => {
        const d = Math.sqrt(Math.pow(hub.lat - lat, 2) + Math.pow(hub.lon - lon, 2));
        if (d < minDistance) {
          minDistance = d;
          nearestHub = hub;
        }
      });

      const approxKm = minDistance * 111.1; // 1 degree latitude ~ 111.1km
      if (approxKm < 15) {
        return { class: nearestHub.bortle, source: `Urban center near ${nearestHub.name}` };
      } else if (approxKm < 45) {
        return { class: Math.max(5, nearestHub.bortle - 2), source: `Suburban zone near ${nearestHub.name}` };
      } else if (approxKm < 100) {
        return { class: Math.max(3, nearestHub.bortle - 4), source: `Rural fringe of ${nearestHub.name}` };
      } else {
        return { class: 2, source: `Pristine dark sky far from major cities` };
      }
    };

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [gems, setGems] = useState([]);
      
      // Simulation & Astral State variables
      const [useLiveLocation, setUseLiveLocation] = useState(true);
      const [latitude, setLatitude] = useState(37.7749); // Default San Francisco coordinates
      const [longitude, setLongitude] = useState(-122.4194);
      const [cloudCover, setCloudCover] = useState(20); // Slider: 0 - 100%
      const [bortleScale, setBortleScale] = useState(4); // Slider: 1 (pristine) - 9 (inner city)
      const [bortleSource, setBortleSource] = useState("Proximity approximation");
      const [timeHour, setTimeHour] = useState(new Date().getHours()); // 0 - 23
      const [simulateDate, setSimulateDate] = useState(new Date());
      
      // Interactive Toggles for Planets/Celestial Bodies that power crystals
      const [skyToggles, setSkyToggles] = useState({
        moon: true,
        sun: false,
        venus: false,
        jupiter: false,
        mars: false
      });

      // Selected crystal profile for simulation
      const [simCrystalType, setSimCrystalType] = useState("Moonstone");

      // API State
      const [isFetchingWeather, setIsFetchingWeather] = useState(false);
      const [showExplanationModal, setShowExplanationModal] = useState(false);

      // Oracle AI State
      const [oracleQuery, setOracleQuery] = useState("");
      const [loadingOracle, setLoadingOracle] = useState(false);
      const [chatHistory, setChatHistory] = useState([
        { role: 'assistant', text: "Welcome, Stargazer. I am Lumina's Lunar Oracle. Ask me how to calculate or optimize your local moonlight efficiency, or get custom crystal advice based on tonight's atmospheric factors." }
      ]);

      // Modal State
      const [showAddGemModal, setShowAddGemModal] = useState(false);
      const [newGemName, setNewGemName] = useState("");
      const [newGemType, setNewGemType] = useState("Moonstone");
      const [newGemPhase, setNewGemPhase] = useState("Full Moon");
      const [newGemStartCharging, setNewGemPhaseStartCharging] = useState(true);
      const [toastMessage, setToastMessage] = useState(null);

      useEffect(() => {
        fetchLiveWeatherAndAether(latitude, longitude);
      }, [latitude, longitude]);

      // LocalStorage initialization fallback
      useEffect(() => {
        const saved = localStorage.getItem('lumina_gems_v3');
        if (saved) {
          try {
            setGems(JSON.parse(saved));
          } catch (e) {
            console.error(e);
          }
        } else {
          const initialMock = [
            { id: "1", name: "Lunar Beacon", type: "Moonstone", chargeLevel: 45, isCharging: true, preferredPhase: "Full Moon" },
            { id: "2", name: "Amethyst Shield", type: "Amethyst", chargeLevel: 15, isCharging: false, preferredPhase: "Third Quarter" },
          ];
          setGems(initialMock);
          localStorage.setItem('lumina_gems_v3', JSON.stringify(initialMock));
        }
      }, []);

      useEffect(() => {
        if (gems.length > 0) {
          localStorage.setItem('lumina_gems_v3', JSON.stringify(gems));
        }
      }, [gems]);

      // Auto-updating live time
      useEffect(() => {
        if (useLiveLocation) {
          const timer = setInterval(() => {
            const now = new Date();
            setTimeHour(now.getHours());
            setSimulateDate(now);
          }, 30000);
          return () => clearInterval(timer);
        }
      }, [useLiveLocation]);

      // Geolocation Tracker
      useEffect(() => {
        if (useLiveLocation && navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const lat = parseFloat(position.coords.latitude.toFixed(4));
              const lon = parseFloat(position.coords.longitude.toFixed(4));
              setLatitude(lat);
              setLongitude(lon);
            },
            (error) => {
              console.warn("Location permission denied. Utilizing simulated default.");
              setUseLiveLocation(false);
            }
          );
        }
      }, [useLiveLocation]);

      // Dynamic Charge & Discharge accumulation engine (Runs every 3 seconds)
      useEffect(() => {
        const chargeTimer = setInterval(() => {
          const { combinedPower } = calculateUnifiedEnergy();
          
          setGems(prevGems => {
            return prevGems.map(gem => {
              const profile = CRYSTAL_PROFILES[gem.type] || CRYSTAL_PROFILES.Moonstone;
              let newLevel = gem.chargeLevel;

              if (gem.isCharging) {
                if (combinedPower > 0) {
                  // Standard charging
                  const gain = (combinedPower / 100) * profile.rate * 2.5; 
                  newLevel = Math.min(100, gem.chargeLevel + gain);
                } else {
                  // Discharging: lentamente drena energia se o carregador está ligado mas não há energia
                  const drain = 0.8; 
                  newLevel = Math.max(0, gem.chargeLevel - drain);
                }
              }

              return { ...gem, chargeLevel: parseFloat(newLevel.toFixed(2)) };
            });
          });
        }, 3000);

        return () => clearInterval(chargeTimer);
      }, [timeHour, cloudCover, bortleScale, simulateDate, skyToggles]);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 3500);
      };

      const fetchLiveWeatherAndAether = async (lat, lon) => {
        if (isNaN(lat) || isNaN(lon)) return;
        setIsFetchingWeather(true);
        
        const est = estimateBortleAndRegion(lat, lon);
        setBortleScale(est.class);
        setBortleSource(est.source);

        try {
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=cloud_cover`);
          if (res.ok) {
            const data = await res.json();
            if (data && data.current && typeof data.current.cloud_cover !== 'undefined') {
              setCloudCover(data.current.cloud_cover);
              showToast(`Environment matched: ${data.current.cloud_cover}% cloud density.`);
            }
          }
        } catch (err) {
          console.warn("Failed to fetch meteorology from API. Using simulated inputs.");
        } finally {
          setIsFetchingWeather(false);
        }
      };

      // Simplified everyday terminology equations engine
      const calculateUnifiedEnergy = () => {
        const knownNewMoon = new Date('2000-01-06T18:14:00Z');
        const msPerDay = 24 * 60 * 60 * 1000;
        const diffDays = (simulateDate - knownNewMoon) / msPerDay;
        const cycleLength = 29.530588853; 
        const phaseValue = (diffDays / cycleLength) % 1;
        const normalizedPhase = phaseValue < 0 ? phaseValue + 1 : phaseValue;

        let phaseName = "";
        let baseIllumination = 0;

        if (normalizedPhase < 0.03 || normalizedPhase > 0.97) {
          phaseName = "New Moon";
          baseIllumination = 0;
        } else if (normalizedPhase >= 0.03 && normalizedPhase < 0.22) {
          phaseName = "Waxing Crescent";
          baseIllumination = Math.sin((normalizedPhase / 0.22) * (Math.PI / 2)) * 40;
        } else if (normalizedPhase >= 0.22 && normalizedPhase < 0.28) {
          phaseName = "First Quarter";
          baseIllumination = 50;
        } else if (normalizedPhase >= 0.28 && normalizedPhase < 0.47) {
          phaseName = "Waxing Gibbous";
          baseIllumination = 50 + Math.sin(((normalizedPhase - 0.28) / 0.19) * (Math.PI / 2)) * 45;
        } else if (normalizedPhase >= 0.47 && normalizedPhase <= 0.53) {
          phaseName = "Full Moon";
          baseIllumination = 100;
        } else if (normalizedPhase > 0.53 && normalizedPhase <= 0.72) {
          phaseName = "Waning Gibbous";
          baseIllumination = 50 + Math.sin(((0.72 - normalizedPhase) / 0.19) * (Math.PI / 2)) * 45;
        } else if (normalizedPhase > 0.72 && normalizedPhase <= 0.78) {
          phaseName = "Third Quarter";
          baseIllumination = 50;
        } else {
          phaseName = "Waning Crescent";
          baseIllumination = Math.sin(((1 - normalizedPhase) / 0.22) * (Math.PI / 2)) * 40;
        }

        baseIllumination = Math.round(baseIllumination);
        const isNight = timeHour >= 19 || timeHour < 6;
        const isDay = !isNight;

        let moonAltitude = 0;
        let altitudeModifier = 0; 
        if (isNight) {
          let offset = timeHour >= 19 ? timeHour - 19 : timeHour + 5;
          moonAltitude = Math.round(90 * Math.sin((offset / 11) * Math.PI));
          altitudeModifier = Math.sin((moonAltitude * Math.PI) / 180);
        }
        altitudeModifier = Math.max(0, parseFloat(altitudeModifier.toFixed(2)));

        // Dumbed down physics parameters
        const skyClearness = (100 - cloudCover) / 100;
        const lightsBlockage = (10 - bortleScale) / 9;

        // Calculate direct celestial outputs
        const moonPower = isNight ? Math.round(baseIllumination * altitudeModifier * skyClearness * lightsBlockage) : 0;
        const sunPower = isDay ? Math.round(100 * skyClearness) : 0;
        const isVenusUp = (timeHour >= 17 && timeHour <= 20) || (timeHour >= 4 && timeHour <= 7);
        const venusPower = isVenusUp ? Math.round(40 * skyClearness * lightsBlockage) : 0;
        const isJupiterUp = (timeHour >= 21 || timeHour <= 3);
        const jupiterPower = isJupiterUp ? Math.round(35 * skyClearness * lightsBlockage) : 0;
        const isMarsUp = (timeHour >= 1 && timeHour <= 6);
        const marsPower = isMarsUp ? Math.round(30 * skyClearness * lightsBlockage) : 0;

        // Sum powers of selected systems
        let activePowerSum = 0;
        if (skyToggles.moon) activePowerSum += moonPower;
        if (skyToggles.sun) activePowerSum += sunPower;
        if (skyToggles.venus) activePowerSum += venusPower;
        if (skyToggles.jupiter) activePowerSum += jupiterPower;
        if (skyToggles.mars) activePowerSum += marsPower;

        const combinedPower = Math.min(100, Math.max(0, activePowerSum));

        return {
          phaseName,
          baseIllumination,
          isNight,
          isDay,
          moonAltitude,
          altitudeModifier,
          skyClearness,
          lightsBlockage,
          moonPower,
          sunPower,
          venusPower,
          jupiterPower,
          marsPower,
          isVenusUp,
          isJupiterUp,
          isMarsUp,
          combinedPower
        };
      };

      const {
        phaseName,
        baseIllumination,
        isNight,
        moonAltitude,
        altitudeModifier,
        skyClearness,
        lightsBlockage,
        moonPower,
        sunPower,
        venusPower,
        jupiterPower,
        marsPower,
        isVenusUp,
        isJupiterUp,
        isMarsUp,
        combinedPower
      } = calculateUnifiedEnergy();

      const getSimulatedChargeStats = (gem) => {
        const profile = CRYSTAL_PROFILES[gem.type] || CRYSTAL_PROFILES.Moonstone;
        
        if (gem.chargeLevel >= 100) {
          return { status: "Fully Charged ✨", timeText: "Complete", speed: 0 };
        }

        if (!gem.isCharging) {
          return { status: "Paused ⏸️", timeText: "Not charging", speed: 0 };
        }

        if (combinedPower > 0) {
          const chargeGainedPerInterval = (combinedPower / 100) * profile.rate * 2.5;
          const hourlyRate = chargeGainedPerInterval * 120; // Scale to simulated hour
          const hoursLeft = (100 - gem.chargeLevel) / hourlyRate;

          const hrs = Math.floor(hoursLeft);
          const mins = Math.round((hoursLeft - hrs) * 60);

          return {
            status: "Charging ⚡",
            timeText: hrs > 0 || mins > 0 ? `${hrs}h ${mins}m left` : "Calculating...",
            speed: parseFloat(hourlyRate.toFixed(2))
          };
        } else {
          const drainPerHour = 8.0; 
          const hoursUntilEmpty = gem.chargeLevel / drainPerHour;
          
          const hrs = Math.floor(hoursUntilEmpty);
          const mins = Math.round((hoursUntilEmpty - hrs) * 60);

          return {
            status: "Draining ❄️",
            timeText: gem.chargeLevel > 0 ? `${hrs}h ${mins}m to empty` : "Completely empty",
            speed: -drainPerHour
          };
        }
      };

      const handleToggleSky = (body) => {
        setSkyToggles(prev => ({ ...prev, [body]: !prev[body] }));
        showToast(`${body.charAt(0).toUpperCase() + body.slice(1)} charger toggled.`);
      };

      const handleAddGem = (e) => {
        e.preventDefault();
        if (!newGemName.trim()) {
          showToast("Give your crystal a name.");
          return;
        }

        const newGemObj = {
          id: crypto.randomUUID(),
          name: newGemName,
          type: newGemType,
          preferredPhase: newGemPhase,
          chargeLevel: 0,
          isCharging: newGemStartCharging,
          timestamp: Date.now()
        };

        setGems(prev => [...prev, newGemObj]);
        setNewGemName("");
        setShowAddGemModal(false);
        showToast(`${newGemType} added to your vault!`);
      };

      const toggleGemCharging = (gemId, currentStatus) => {
        setGems(prev => prev.map(gem => gem.id === gemId ? { ...gem, isCharging: !currentStatus } : gem));
        showToast(!currentStatus ? "Charging started!" : "Charging suspended.");
      };

      const handleDeleteGem = (gemId) => {
        setGems(prev => prev.filter(gem => gem.id !== gemId));
        showToast("Gem removed.");
      };

      const handleResetCharge = (gemId) => {
        setGems(prev => prev.map(gem => gem.id === gemId ? { ...gem, chargeLevel: 0 } : gem));
        showToast("Crystal energy wiped.");
      };

      // Generate simulated overnight chart timeline
      const generateHourlyForecast = () => {
        const hours = [19, 20, 21, 22, 23, 0, 1, 2, 3, 4, 5];
        const testProfile = CRYSTAL_PROFILES[simCrystalType] || CRYSTAL_PROFILES.Moonstone;
        let accumulated = 0;

        return hours.map((hr) => {
          const isNightH = hr >= 19 || hr < 6;
          const isDayH = !isNightH;
          let offset = hr >= 19 ? hr - 19 : hr + 5;
          const hourAltitude = isNightH ? Math.round(90 * Math.sin((offset / 11) * Math.PI)) : 0;
          const altMod = Math.sin((hourAltitude * Math.PI) / 180);
          const isVenusUpH = (hr >= 17 && hr <= 20) || (hr >= 4 && hr <= 7);
          const isJupiterUpH = (hr >= 21 || hr <= 3);
          const isMarsUpH = (hr >= 1 && hr <= 6);

          const mPower = isNightH ? Math.round(baseIllumination * altMod * skyClearness * lightsBlockage) : 0;
          const sPower = isDayH ? Math.round(100 * skyClearness) : 0;
          const vPower = isVenusUpH ? Math.round(40 * skyClearness * lightsBlockage) : 0;
          const jPower = isJupiterUpH ? Math.round(35 * skyClearness * lightsBlockage) : 0;
          const maPower = isMarsUpH ? Math.round(30 * skyClearness * lightsBlockage) : 0;

          let sumPower = 0;
          if (skyToggles.moon) sumPower += mPower;
          if (skyToggles.sun) sumPower += sPower;
          if (skyToggles.venus) sumPower += vPower;
          if (skyToggles.jupiter) sumPower += jPower;
          if (skyToggles.mars) sumPower += maPower;

          sumPower = Math.min(100, Math.max(0, sumPower));
          const speedPct = (sumPower / 100) * testProfile.rate * 2.5; 
          accumulated = Math.min(100, accumulated + speedPct);

          return {
            hour: hr,
            timeString: hr === 0 ? "12:00 AM" : hr > 12 ? `${hr - 12}:00 PM` : `${hr}:00 AM`,
            efficiency: sumPower,
            rateGained: parseFloat(speedPct.toFixed(2)),
            cumulativeTotal: parseFloat(accumulated.toFixed(2)),
            altitude: Math.max(0, hourAltitude)
          };
        });
      };

      const timeline = generateHourlyForecast();
      const totalYield = timeline.length > 0 ? timeline[timeline.length - 1].cumulativeTotal : 0;

      const chargingSensitiveCrystals = gems.filter(g => g.isCharging && CRYSTAL_PROFILES[g.type]?.sensitiveToSun);

      return (
        <div className="flex-1 flex flex-col pb-20 md:pb-0">
          
          {/* Solar Warnings */}
          {isNight === false && skyToggles.sun && chargingSensitiveCrystals.length > 0 && (
            <div className="bg-gradient-to-r from-amber-600 to-rose-600 px-4 py-2.5 text-center text-xs font-semibold flex items-center justify-center space-x-2 shadow-lg animate-pulse">
              <span>⚠️</span>
              <span>
                <strong>Sun Danger!</strong> Bring your {chargingSensitiveCrystals.map(c => c.name).join(', ')} indoors! The sun charger is ON and can damage these stones.
              </span>
            </div>
          )}

          {/* Header */}
          <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md py-4 px-6 flex justify-between items-center sticky top-0 z-40">
            <div className="flex items-center space-x-2">
              <div className="relative">
                <div className="absolute inset-0 bg-indigo-500/30 rounded-full filter blur-md animate-pulse"></div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-indigo-400 relative">
                  <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                </svg>
              </div>
              <div>
                <h1 className="font-serif text-lg tracking-wider font-semibold text-transparent bg-clip-text bg-gradient-to-r from-indigo-200 to-indigo-400">
                  LUMINA
                </h1>
                <p className="text-[10px] text-slate-500 font-mono tracking-widest">EASY CELESTIAL CRYSTAL CHARGER</p>
              </div>
            </div>

            <div className="flex items-center space-x-4">
              <div className="hidden md:flex items-center space-x-2 text-xs text-slate-400 font-mono bg-slate-900 border border-slate-800 px-3.5 py-1.5 rounded-full">
                <span className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-ping"></span>
                <span>Active Charger Power: {combinedPower}%</span>
              </div>
              <button 
                onClick={() => setShowAddGemModal(true)}
                className="flex items-center space-x-1.5 px-4 py-2 rounded-full text-xs font-bold bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition-all text-white shadow-lg"
              >
                <span>+ Add Crystal</span>
              </button>
            </div>
          </header>

          {/* Main workspace container */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 flex flex-col space-y-6">
            
            {/* Top Section: Automatic Sky reader and planetary switches */}
            <section className="w-full bg-gradient-to-br from-slate-900 via-slate-950 to-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl relative overflow-hidden">
