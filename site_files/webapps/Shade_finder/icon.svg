<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Perfectly mathematical scalloped umbrella shape -->
        <clipPath id="canopy-clip">
            <path d="M 112 240 A 144 144 0 0 1 400 240 A 48 48 0 0 0 304 240 A 48 48 0 0 0 208 240 A 48 48 0 0 0 112 240 Z" />
        </clipPath>
    </defs>

    <!-- Sky Background -->
    <rect width="512" height="512" fill="#7DD3FC" />

    <!-- Ocean/Sea Horizon -->
    <path d="M 0 230 Q 128 215 256 230 T 512 230 L 512 512 L 0 512 Z" fill="#0EA5E9" />
    <path d="M 0 250 Q 128 265 256 250 T 512 250 L 512 512 L 0 512 Z" fill="#0284C7" opacity="0.3" />

    <!-- Beach/Sand -->
    <path d="M 0 320 Q 150 290 256 320 T 512 300 L 512 512 L 0 512 Z" fill="#FDE047" />
    <path d="M 0 350 Q 150 370 256 350 T 512 360 L 512 512 L 0 512 Z" fill="#FBBF24" opacity="0.4" />

    <!-- Sun and Rays -->
    <g id="sun" transform="translate(100, 100)">
        <g stroke="#FBBF24" stroke-width="8" stroke-linecap="round">
            <line x1="0" y1="-55" x2="0" y2="-75" />
            <line x1="0" y1="55" x2="0" y2="75" />
            <line x1="-55" y1="0" x2="-75" y2="0" />
            <line x1="55" y1="0" x2="75" y2="0" />
            <line x1="39" y1="-39" x2="53" y2="-53" />
            <line x1="39" y1="39" x2="53" y2="53" />
            <line x1="-39" y1="39" x2="-53" y2="53" />
            <line x1="-39" y1="-39" x2="-53" y2="-53" />
        </g>
        <circle cx="0" cy="0" r="45" fill="#FEF08A" stroke="#FBBF24" stroke-width="6" />
    </g>

    <!-- Shadow on the sand (angled away from the top-left sun) -->
    <ellipse cx="340" cy="425" rx="100" ry="25" fill="#A16207" opacity="0.35" transform="rotate(-5 340 425)" />

    <!-- Umbrella Pole -->
    <rect x="248" y="230" width="16" height="200" rx="8" fill="#92400E" />
    
    <!-- Umbrella Canopy -->
    <g clip-path="url(#canopy-clip)">
        <!-- Red Base -->
        <rect x="100" y="50" width="320" height="200" fill="#EF4444" />
        
        <!-- Center White Stripe -->
        <polygon points="256,96 208,240 304,240" fill="#F8FAFC" />
        
        <!-- Left Side Highlight (3D Effect) -->
        <polygon points="256,96 112,240 208,240" fill="#FFFFFF" opacity="0.2" />
        
        <!-- Right Side Shadow (3D Effect) -->
        <polygon points="256,96 304,240 400,240" fill="#000000" opacity="0.1" />
    </g>
    
    <!-- Inner Scallop Shadow Lines for Depth -->
    <path d="M 112 240 A 144 144 0 0 1 400 240 A 48 48 0 0 0 304 240 A 48 48 0 0 0 208 240 A 48 48 0 0 0 112 240 Z" fill="none" stroke="#991B1B" stroke-width="4" opacity="0.3" />

    <!-- Top Finial (Wooden cap on top of umbrella) -->
    <circle cx="256" cy="92" r="10" fill="#FBBF24" />
    <path d="M 256 82 L 260 92 L 252 92 Z" fill="#F59E0B" />
</svg>